<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC T20 WC 2026 - Win Prediction</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
            --header-grad: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            --shadow-premium: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            /* Keep above bottom lower-third/scoreboard region */
            padding: 60px 100px 115px;
            /* Safe Area */
        }

        .win-prediction {
            width: 300px;
            background-color: var(--primary-navy);
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative; overflow: hidden;
            visibility: hidden;
            border-left: 6px solid var(--accent-pink);
        }

        .win-prediction::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(168deg, rgba(77, 3, 167, 0.9) 0%, rgba(50, 0, 120, 0.98) 100%);
            z-index: 0;
        }

        .header {
            height: 33px;
            background: var(--header-grad);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: relative; z-index: 10;
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
        }

        .prediction-body {
            padding: 13px 19px;
            position: relative; z-index: 5;
            background: var(--master-grad); position: relative; }

        .team-blocks {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .team-block.right {
            align-items: flex-end;
        }

        .team-name {
            color: var(--accent-cyan);
            font-family: var(--font-display);
            font-size: 18px;

            /* font-weight: 700; */
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
        }

        .probability-val {
            color: #fff;
            font-family: var(--font-mono);
            font-size: 31px;
            font-weight: 700;
            line-height: 0.9;
        }

        .bar-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
            display: flex;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .bar-fill {
            height: 100%;
            position: relative; }

        .bar-ind {
            background: linear-gradient(90deg, #ff9933);
            background-size: 100% 100%;
            z-index: 2;
        }

        .bar-pak {
            background: linear-gradient(90deg, #fded00, #ff9933);
            z-index: 1;
            flex: 1;
        }

        .footer {
            height: 26px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            position: relative; z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Glass Shine Overlay */
        .glass-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: var(--glass-shine);
            pointer-events: none;
            z-index: 15;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: win_prediction.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>
    <div id="safe-area" aria-hidden="true"></div>
    <div class="win-prediction">
        <div class="glass-shine"></div>
        <div class="header">
            <div class="header-title">Win Prediction</div>
        </div>
        <div class="prediction-body">
            <div class="team-blocks">
                <div class="team-block">
                    <span class="team-name">IND</span>
                    <span id="ind-val" class="probability-val">0%</span>
                </div>
                <div class="team-block right">
                    <span class="team-name">PAK</span>
                    <span id="pak-val" class="probability-val">0%</span>
                </div>
            </div>
            <div class="bar-container">
                <div id="bar-ind" class="bar-fill bar-ind"></div>
                <div id="bar-pak" class="bar-fill bar-pak"></div>
            </div>
        </div>
        <div class="footer">
            <span class="footer-text">Data Analytics Model</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const indProb = 65; // Sample Probability
            const pakProb = 35;

            const card = document.querySelector('.win-prediction');
            const header = document.querySelector('.header');
            const blocks = document.querySelectorAll('.team-block');
            const barInd = document.getElementById('bar-ind');
            const footer = document.querySelector('.footer');

            // Reset state for animation
            // Start at final Y to prevent "jumping" on reload.
            gsap.set(card, { visibility: 'visible', opacity: 0, y: 0 });
            gsap.set(header, { scaleX: 0, transformOrigin: 'left' });
            gsap.set(blocks, { opacity: 0, y: 0 });
            gsap.set(barInd, { width: '0%' });
            gsap.set(footer, { opacity: 0 });

            const tl = gsap.timeline({
                defaults: { ease: 'power4.out', duration: 1.2 }
            });

            tl.to(card, { opacity: 1 })
                .to(header, { scaleX: 1, duration: 0.8 }, '-=0.8')
                .to(blocks, { opacity: 1, stagger: 0.2 }, '-=0.6')
                .to(barInd, {
                    width: indProb + '%',
                    duration: 2,
                    ease: 'power4.inOut'
                }, '-=0.8')
                .to(footer, { opacity: 1, duration: 0.6 }, '-=1');

            // Percentage Count-up
            const indValEl = document.getElementById('ind-val');
            const pakValEl = document.getElementById('pak-val');

            let count = { ind: 0, pak: 0 };
            gsap.to(count, {
                ind: indProb,
                pak: pakProb,
                duration: 2,
                ease: 'power4.inOut',
                delay: 0.4,
                onUpdate: () => {
                    indValEl.innerText = Math.round(count.ind) + '%';
                    pakValEl.innerText = Math.round(count.pak) + '%';
                }
            });
        });
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const card = document.querySelector('.win-prediction');
            const header = document.querySelector('.header');
            const blocks = document.querySelectorAll('.team-block');
            const barInd = document.getElementById('bar-ind');
            const footer = document.querySelector('.footer');
            const tl = gsap.timeline({ defaults: { ease: 'power3.in' } });
            tl.to(footer, { opacity: 0, duration: 0.35 })
                .to(barInd, { width: '0%', duration: 0.55, ease: 'power3.in' }, '-=0.2')
                .to(blocks, { opacity: 0, stagger: 0.08, duration: 0.35 }, '-=0.35')
                .to(header, { scaleX: 0, transformOrigin: 'left', duration: 0.5 }, '-=0.15')
                .to(card, { opacity: 0, duration: 0.55 }, '-=0.25');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
