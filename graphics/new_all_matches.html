<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>All Fixtures - Crystal Glassy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            /* ── YOUR ORIGINAL THEME — UNTOUCHED ── */
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS (new tokens only, no overrides) ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* ══════════════════════════════
           MASTER PANEL — crystal layer added on top of your original styles
        ══════════════════════════════ */
        #fixtures-master {
            width: fit-content;
            background: var(--primary-navy);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong); /* crystal: stronger top edge */
            display: flex;
            flex-direction: column;
            opacity: 0;
            position: relative;
            overflow: hidden;
            max-height: calc(100vh - 100px);

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay (diagonal specular) */
        #fixtures-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #fixtures-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        /* ══════════════════════════════
           HEADER — your original gradient + crystal specular
        ══════════════════════════════ */
        .fixtures-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 15;

            /* crystal: richer inset lighting */
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        /* crystal: top-edge specular line */
        .fixtures-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        /* crystal: gloss bevel */
        .fixtures-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .fixtures-header-title {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            position: relative;
            z-index: 6;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
        }

        .fixtures-header-tag {
            font-size: 11px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            z-index: 6;
        }

        /* ══════════════════════════════
           BODY / TABLE AREA
        ══════════════════════════════ */
        .fixtures-body-wrapper {
            background: var(--master-grad);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .table-head {
            display: grid;
            grid-template-columns: 60px 140px 500px 180px 250px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: stretch;
            padding: 0 15px;
            position: relative;
            z-index: 2;
            /* crystal: subtle top-glass highlight on column headers */
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .table-head > div {
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
        }

        .table-head > div:last-child { border-right: none; }

        .th-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: var(--font-body);
            /* crystal: glow on column labels */
            text-shadow: 0 0 8px rgba(0, 190, 241, 0.45);
        }

        /* ══════════════════════════════
           MATCH ROWS
        ══════════════════════════════ */
        .match-row {
            display: grid;
            grid-template-columns: 60px 140px 500px 180px 250px;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            align-items: stretch;
            opacity: 0;
            transition: background 0.2s ease;
            position: relative;
            z-index: 1;
        }

        /* crystal: per-row micro glass sheen */
        .match-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: linear-gradient(180deg,
                rgba(255, 255, 255, 0.022) 0%,
                transparent 50%,
                rgba(0, 0, 0, 0.05) 100%);
        }

        .match-row > div {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            position: relative;
            z-index: 1;
        }

        .match-row > div:last-child { border-right: none; }

        .match-row:hover {
            background: rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .match-row.active {
            /* crystal: gradient fade instead of flat block */
            background: linear-gradient(90deg,
                rgba(0, 190, 241, 0.12) 0%,
                rgba(0, 190, 241, 0.04) 60%,
                transparent 100%);
            box-shadow:
                inset 0 1px 0 rgba(0, 190, 241, 0.14),
                inset 0 -1px 0 rgba(0, 190, 241, 0.07);
            position: relative;
        }

        .match-row.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            /* crystal: glowing accent bar */
            background: linear-gradient(180deg, var(--accent-cyan) 0%, rgba(0, 190, 241, 0.5) 100%);
            box-shadow: 0 0 8px rgba(0, 190, 241, 0.6);
            z-index: 10;
        }

        .m-id {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-muted);
        }

        .m-time {
            font-size: 13px;
            color: var(--text-white);
            font-weight: 600;
            text-align: center;
        }

        .m-team {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex !important;
            align-items: center;
            justify-content: space-between !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
        }

        .m-flag {
            width: 35px;
            height: 22px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            /* crystal: flag glass edge */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .m-score {
            font-family: var(--font-mono);
            font-size: 16px;
            color: var(--accent-yellow);
            font-weight: 700;
            /* crystal: score glow */
            text-shadow: 0 0 8px rgba(253, 237, 0, 0.45);
        }

        .m-status {
            font-size: 13px;
            color: var(--text-white);
            font-weight: 500;
            text-align: center;
        }

        .status-live {
            color: var(--accent-yellow);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(253, 237, 0, 0.45);
        }

        .status-live::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-yellow);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent-yellow), 0 0 18px rgba(253, 237, 0, 0.35);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%   { opacity: 1; transform: scale(1); }
            50%  { opacity: 0.3; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ══════════════════════════════
           FOOTER
        ══════════════════════════════ */
        .fixtures-footer {
            height: 32px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            position: relative;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        /* crystal: bottom-edge specular line */
        .fixtures-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .footer-meta {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
</head>

<body>
    <div class="broadcast-canvas">
        <div id="fixtures-master">
            <div class="fixtures-header">
                <div class="fixtures-header-title">TOURNAMENT FIXTURES</div>
                <div class="fixtures-header-tag">CRYSTAL FEED</div>
            </div>

            <div class="fixtures-body-wrapper">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png" class="sc-watermark" alt="Watermark">
                <div class="table-head">
                    <div class="th-label">M#</div>
                    <div class="th-label">Schedule</div>
                    <div class="th-label">Matchup</div>
                    <div class="th-label">Score</div>
                    <div class="th-label">Status / Result</div>
                </div>

                <div id="fixtures-container">
                    <!-- Rows injected by JavaScript -->
                </div>
            </div>

            <div class="fixtures-footer">
                <div class="footer-meta">LIVE BROADCAST DATA • ICC T20 WORLD CUP 2026</div>
            </div>
        </div>
    </div>

    <script>
        const matches = [
            { id: "#01", time: "Oct 12, 14:00", teamA: "India",       teamB: "Pakistan",     flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313128.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313129.logo.png", score: "245/6 - 182/9", status: "India won by 63 runs", isLive: false, active: false },
            { id: "#02", time: "Oct 13, 14:00", teamA: "Sri Lanka",   teamB: "Bangladesh",   flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313153.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313126.logo.png", score: "42/1 (8.4)",    status: "In Progress",        isLive: true,  active: true  },
            { id: "#03", time: "Oct 13, 19:30", teamA: "Australia",   teamB: "South Africa", flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313125.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313151.logo.png", score: "VS",            status: "Match Scheduled",    isLive: false, active: false },
            { id: "#04", time: "Oct 14, 14:00", teamA: "England",     teamB: "New Zealand",  flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313136.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313144.logo.png", score: "VS",            status: "Match Scheduled",    isLive: false, active: false },
            { id: "#05", time: "Oct 14, 19:30", teamA: "West Indies", teamB: "Afghanistan",  flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313158.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313124.logo.png", score: "VS",            status: "Match Scheduled",    isLive: false, active: false },
            { id: "#06", time: "Oct 15, 14:00", teamA: "Netherlands", teamB: "Ireland",      flagA: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313143.logo.png", flagB: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313139.logo.png", score: "VS",            status: "Match Scheduled",    isLive: false, active: false }
        ];

        function renderFixtures() {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = '';
            matches.forEach(m => {
                const row = document.createElement('div');
                row.className = `match-row ${m.active ? 'active' : ''}`;

                const scoreContent = m.isLive ?
                    `<div class="m-score" style="color:var(--text-white)">${m.score}</div>` :
                    `<div class="m-score" style="${m.score === 'VS' ? 'opacity:0.2' : ''}">${m.score}</div>`;

                const statusContent = m.isLive ?
                    `<span class="status-live">${m.status}</span>` :
                    m.status;

                row.innerHTML = `
                    <div class="m-id">${m.id}</div>
                    <div class="m-time">${m.time}</div>
                    <div class="m-team">
                        <img src="${m.flagA}" class="m-flag" alt="${m.teamA}">
                        <span>${m.teamA} v ${m.teamB}</span>
                        <img src="${m.flagB}" class="m-flag" alt="${m.teamB}">
                    </div>
                    <div>${scoreContent}</div>
                    <div class="m-status">${statusContent}</div>
                `;
                container.appendChild(row);
            });
        }

        function show() {
            const tl = gsap.timeline();
            tl.fromTo('#fixtures-master',
                { opacity: 0, scale: 0.95 },
                { opacity: 1, scale: 1, duration: 0.8, ease: 'power3.out' }
            )
            .fromTo('.match-row',
                { opacity: 0, x: -10 },
                { opacity: 1, x: 0, duration: 0.4, stagger: 0.08, ease: 'power2.out' },
                '-=0.4'
            );
        }

        window.onload = () => {
            renderFixtures();
            show();
        };
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const tl = gsap.timeline();
            tl.to('.match-row', { opacity: 0, x: 25, duration: 0.4, stagger: 0.04, ease: 'power2.in' })
              .to('#fixtures-master', { opacity: 0, scale: 0.92, y: 30, duration: 0.8, ease: 'power3.in' }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
