<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>ICC T20 WC 2026 - Player L3 Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            /* Keep above bottom scoreboard/lower-third */
            padding: 100px 80px 115px;
        }

        #player-l3 {
            position: relative; display: flex;
            align-items: flex-end;
            visibility: hidden;
        }

        .l3-wrapper {
            width: 550px;
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            position: relative; 
            z-index: 5;
            overflow: hidden;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        .l3-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        .l3-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .l3-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .l3-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .l3-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .l3-name {
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
        }

        .l3-logo {
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            border: 2px solid #fff;
            padding: 3px 10px;
            letter-spacing: 2px;
            z-index: 2;
        }

        .l3-body-frame {
            background: var(--master-grad); 
            position: relative; 
            display: flex;
            flex-direction: column;
            height: 380px;
        }

        .l3-body-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: var(--geo-texture);
            background-size: 250px 250px;
            opacity: 0.12;
            pointer-events: none;
        }

        .l3-sub-header {
            background: rgba(255, 255, 255, 0.05);
            height: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-cyan);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            z-index: 2;
        }

        .l3-career-head {
            background: var(--accent-pink);
            color: #fff;
            padding: 1px 8px;
            font-size: 11px;
            font-weight: 900;
        }

        .l3-stats-container {
            padding: 37px 0 60px;
            width: 54%;
            position: relative; z-index: 2;
            background: rgba(0, 0, 0, 0.35);
        }


        .l3-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); /* tight divider */
            position: relative;
        }

        .l3-stat-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
        }

        .l3-stat-row:last-of-type {
            border-bottom: none;
        }

        .l3-stat-label {
            color: rgb(255 255 255);
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .l3-stat-val {
            color: var(--accent-yellow);
            font-size: 19px;
            font-weight: 900;
        }

        .l3-footer-bars {
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            margin-top: auto;
            z-index: 2;
        }

        .l3-footer-row {
            padding: 8px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            position: relative;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .l3-footer-row::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .l3-footer-row.win {
            background: var(--accent-cyan);
            color: var(--primary-navy-deep);
            font-weight: 900;
            text-align: center;
        }

        .l3-player-cutout {
            position: absolute;
            right: 3px;
            bottom: 34px;
            height: 316px;
            z-index: 10;
        }

        .l3-player-cutout img {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(15px 0 25px rgba(0, 0, 0, 0.7));
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: player_l3_stats.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>
    <div id="safe-area" aria-hidden="true"></div>
    <div id="player-l3">
        <div class="l3-wrapper">
            <div class="l3-header">
                <div class="l3-name">Virat Kohli</div>
                <div class="l3-logo">ICC</div>
            </div>
            <div class="l3-body-frame">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png" class="sc-watermark" alt="Watermark">
                <div class="l3-sub-header">
                    <span>Right Hand Bat</span>
                    <div class="l3-career-head">T20 CAREER</div>
                    <span>Age - 36</span>
                </div>
                <div class="l3-stats-container">
                    <div class="l3-stat-row">
                        <span class="l3-stat-label">Matches</span>
                        <span class="l3-stat-val">125</span>
                    </div>
                    <div class="l3-stat-row">
                        <span class="l3-stat-label">Runs</span>
                        <span class="l3-stat-val">4188</span>
                    </div>
                    <div class="l3-stat-row">
                        <span class="l3-stat-label">Average</span>
                        <span class="l3-stat-val">52.35</span>
                    </div>
                    <div class="l3-stat-row">
                        <span class="l3-stat-label">Strike Rate</span>
                        <span class="l3-stat-val">139.8</span>
                    </div>
                    <div class="l3-stat-row">
                        <span class="l3-stat-label">50s / 100s</span>
                        <span class="l3-stat-val">38 / 1</span>
                    </div>
                </div>
                <div class="l3-footer-bars">
                    <div class="l3-footer-row">T20 World Cup 2024</div>
                    <div class="l3-footer-row win"><span>India Champions 2024</span></div>
                </div>
            </div>
        </div>
        <div class="l3-player-cutout">
            <img src="https://static.toiimg.com/photo/119129076.cms" alt="Virat Kohli">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const root = document.getElementById('player-l3');
            gsap.set(root, { visibility: 'visible', opacity: 1 });

            const tl = gsap.timeline();
            tl.fromTo('.l3-header', { y: 0, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: 'power3.out' })
                .fromTo('.l3-body-frame', { scaleY: 0, transformOrigin: 'top', opacity: 0 }, { scaleY: 1, opacity: 1, duration: 0.8, ease: 'power3.out' }, '-=0.4')
                .fromTo('.l3-sub-header', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out' }, '-=0.2')
                .fromTo('.l3-stat-row', { x: -30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, stagger: 0.08, ease: 'power2.out' }, '-=0.4')
                .fromTo('.l3-player-cutout', { x: 50, opacity: 0, scale: 0.98 }, { x: 0, opacity: 1, scale: 1, duration: 1.2, ease: 'power4.out' }, '-=1')
                .fromTo('.l3-footer-row', { y: 0, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }, '-=0.5');
        });

        function hide() {
            const tl = gsap.timeline({ defaults: { ease: 'power3.in' } });
            tl.to('.l3-footer-row', { opacity: 0, duration: 0.3, stagger: 0.05 })
                .to('.l3-player-cutout', { x: 50, opacity: 0, scale: 0.98, duration: 0.55 }, '-=0.15')
                .to('.l3-stat-row', { x: -30, opacity: 0, stagger: 0.06, duration: 0.4 }, '-=0.25')
                .to('.l3-sub-header', { opacity: 0, x: -20, duration: 0.3 }, '-=0.15')
                .to('.l3-body-frame', { scaleY: 0, transformOrigin: 'top', opacity: 0, duration: 0.55 }, '-=0.1')
                .to('.l3-header', { opacity: 0, duration: 0.4 }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
