<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Match Summary - Crystal Glassy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c;
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            width: 1920px; height: 1080px; overflow: hidden; background: transparent;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
        }

        #summary-master {
            width: 1200px; background: var(--primary-navy-deep); border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink); display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            opacity: 0; position: relative; transform: scale(0.9);
        }

        #summary-master::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }

        .summary-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; position: relative; border-bottom: 5px solid var(--accent-cyan); z-index: 10;
        }

        .summary-header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%; background: var(--glass-shine); }

        .header-title { font-family: var(--font-display); font-size: 32px; color: var(--text-white); text-transform: uppercase; letter-spacing: 6px; font-weight: 900; }
        .header-venue { font-size: 14px; font-weight: 900; color: var(--text-white); letter-spacing: 3px; text-transform: uppercase; }

        .summary-body { display: flex; position: relative; background: var(--master-grad); height: 380px; }

        .team-block { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .team-block.winner { background: linear-gradient(135deg, rgba(0, 190, 241, 0.05) 0%, transparent 100%); }

        .winner-badge {
            position: absolute; top: 20px; right: 40px; background: var(--accent-yellow);
            color: #000; font-family: var(--font-display); font-size: 12px; font-weight: 900;
            padding: 4px 15px; letter-spacing: 2px; transform: skewX(-15deg); display: none;
        }

        .team-name-row { display: flex; align-items: center; gap: 20px; }
        .team-flag { width: 80px; height: 50px; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1); }
        .team-name { font-family: var(--font-display); font-size: 48px; color: var(--text-white); text-transform: uppercase; letter-spacing: 2px; }

        .team-score { font-family: var(--font-display); font-size: 72px; color: var(--accent-yellow); font-weight: 900; line-height: 1; }
        .team-overs { font-size: 24px; color: var(--text-muted); font-weight: 400; margin-left: 10px; }

        .performer { display: flex; flex-direction: column; gap: 5px; border-left: 4px solid var(--accent-cyan); padding-left: 15px; }
        .perf-label { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .perf-name { font-family: var(--font-display); font-size: 24px; color: var(--text-white); text-transform: uppercase; }
        .perf-stats { font-size: 14px; font-family: var(--font-mono); color: var(--accent-cyan); font-weight: 700; }

        .vs-divider { width: 2px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent); position: relative; display: flex; justify-content: center; align-items: center; }
        .vs-circle { width: 60px; height: 60px; background: var(--primary-navy-deep); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: var(--font-display); font-size: 18px; color: var(--text-muted); font-weight: 900; box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 5; }

        .summary-footer { height: 70px; background: rgba(0, 190, 241, 0.1); display: flex; align-items: center; justify-content: center; border-top: 3px solid var(--accent-cyan); position: relative; }
        .result-text { font-family: var(--font-display); font-size: 32px; color: var(--text-white); text-transform: uppercase; letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px rgba(0, 190, 241, 0.4); }
    </style>
</head>
<body>
    <div class="broadcast-canvas">
        <div id="summary-master">
            <div class="summary-header">
                <div class="header-title">MATCH SUMMARY</div>
                <div class="header-venue" id="m-venue">INTERNATIONAL CRICKET STADIUM</div>
            </div>

            <div class="summary-body">
                <!-- Team 1 (Left) -->
                <div class="team-block">
                    <div class="winner-badge">WINNER</div>
                    <div class="team-name-row">
                        <img src="" class="team-flag" id="t1-flag">
                        <div class="team-name" id="t1-name">TEAM 1</div>
                    </div>
                    <div class="team-score" id="t1-score">0/0 <span class="team-overs" id="t1-ov">(0.0)</span></div>
                    
                    <div class="performer">
                        <span class="perf-label">TOP BATSMAN</span>
                        <span class="perf-name" id="t1-bat">N/A</span>
                        <span class="perf-stats" id="t1-bat-s">0 (0)</span>
                    </div>
                </div>

                <div class="vs-divider">
                    <div class="vs-circle">VS</div>
                </div>

                <!-- Team 2 (Right) -->
                <div class="team-block">
                    <div class="winner-badge">WINNER</div>
                    <div class="team-name-row">
                        <img src="" class="team-flag" id="t2-flag">
                        <div class="team-name" id="t2-name">TEAM 2</div>
                    </div>
                    <div class="team-score" id="t2-score">0/0 <span class="team-overs" id="t2-ov">(0.0)</span></div>
                    
                    <div class="performer">
                        <span class="perf-label">TOP BATSMAN</span>
                        <span class="perf-name" id="t2-bat">N/A</span>
                        <span class="perf-stats" id="t2-bat-s">0 (0)</span>
                    </div>
                </div>
            </div>

            <div class="summary-footer">
                <div class="result-text" id="result-txt">MATCH IN PROGRESS</div>
            </div>
        </div>
    </div>

    <script>
        function updateGraphic(data) {
            console.log("MATCH SUMMARY DATA:", data);
            if (!data) return;

            if (data.venue) document.getElementById('m-venue').textContent = data.venue.toUpperCase();
            if (data.result) document.getElementById('result-txt').textContent = data.result.toUpperCase();

            const blocks = document.querySelectorAll('.team-block');
            
            // Handle Inning 1 (Left)
            if (data.innings && data.innings[0]) {
                const inn = data.innings[0];
                const block = blocks[0];
                document.getElementById('t1-flag').src = inn.teamFlag || '';
                document.getElementById('t1-name').textContent = (inn.teamName || 'UNKNOWN').toUpperCase();
                document.getElementById('t1-score').innerHTML = `${inn.runs}/${inn.wickets} <span class="team-overs">(${inn.overs})</span>`;
                document.getElementById('t1-bat').textContent = (inn.batter || 'N/A').toUpperCase();
                document.getElementById('t1-bat-s').textContent = `${inn.batterRuns || 0} (${inn.batterBalls || 0})`;
                
                if (data.result && data.result.toUpperCase().includes(inn.teamName.toUpperCase()) && data.result.toUpperCase().includes('WON')) {
                    block.classList.add('winner');
                    block.querySelector('.winner-badge').style.display = 'block';
                } else {
                    block.classList.remove('winner');
                    block.querySelector('.winner-badge').style.display = 'none';
                }
            }

            // Handle Inning 2 (Right)
            if (data.innings && data.innings[1]) {
                const inn = data.innings[1];
                const block = blocks[1];
                document.getElementById('t2-flag').src = inn.teamFlag || '';
                document.getElementById('t2-name').textContent = (inn.teamName || 'UNKNOWN').toUpperCase();
                document.getElementById('t2-score').innerHTML = `${inn.runs}/${inn.wickets} <span class="team-overs">(${inn.overs})</span>`;
                document.getElementById('t2-bat').textContent = (inn.batter || 'N/A').toUpperCase();
                document.getElementById('t2-bat-s').textContent = `${inn.batterRuns || 0} (${inn.batterBalls || 0})`;
                
                if (data.result && data.result.toUpperCase().includes(inn.teamName.toUpperCase()) && data.result.toUpperCase().includes('WON')) {
                    block.classList.add('winner');
                    block.querySelector('.winner-badge').style.display = 'block';
                } else {
                    block.classList.remove('winner');
                    block.querySelector('.winner-badge').style.display = 'none';
                }
            } else {
                const block = blocks[1];
                document.getElementById('t2-score').innerHTML = `<span class="team-overs" style="margin-left:0; font-size:40px; color:var(--accent-cyan); font-weight:900">YET TO BAT</span>`;
                document.getElementById('t2-bat').textContent = 'N/A';
                document.getElementById('t2-bat-s').textContent = '0 (0)';
                block.classList.remove('winner');
                block.querySelector('.winner-badge').style.display = 'none';
            }
        }

        function show() {
            const tl = gsap.timeline();
            tl.fromTo('#summary-master', { opacity: 0, scale: 0.9, y: 50 }, { opacity: 1, scale: 1, y: 0, duration: 1.2, ease: 'power3.out' })
              .fromTo('.team-block', { opacity: 0, x: (i) => i === 0 ? -50 : 50 }, { opacity: 1, x: 0, duration: 1, ease: 'power3.out' }, '-=0.8')
              .fromTo('.performer', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, stagger: 0.2, ease: 'power2.out' }, '-=0.5')
              .fromTo('.result-text', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.8, ease: 'power2.out' }, '-=0.3');
        }

        function hide() {
            const tl = gsap.timeline();
            tl.to('.performer', { opacity: 0, y: 20, duration: 0.3, stagger: 0.05, ease: 'power2.in' })
              .to('.result-text', { opacity: 0, scale: 0.8, duration: 0.3, ease: 'power2.in' }, '-=0.2')
              .to('#summary-master', { opacity: 0, scale: 0.95, y: 50, duration: 0.5, ease: 'power2.in' }, '-=0.2');
        }

        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase2/match-summary/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    updateGraphic(json.data || json);
                }
            } catch (e) { console.error("API ERROR:", e); }
            show();
        };

        window.addEventListener('message', (e) => { if (e.data === 'HIDE') hide(); });
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'match_summary') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) updateGraphic(p.data);
                    show();
                } else if (p.type === 'hide') hide();
            }
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
</body>
</html>
