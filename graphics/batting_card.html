<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC T20 WC 2026 - Batting Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c;
            /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            padding-bottom: clamp(60px, 6vw, 120px);
            padding-left: clamp(16px, 6vw, 100px);
        }

        #batting-card {
            background: var(--primary-navy);
            background-image: var(--master-grad);
            position: relative;
            width: 458px;
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            overflow: hidden;
            box-shadow: 0 40px 110px rgba(0, 0, 0, 0.75), 0 20px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
            visibility: hidden;
            opacity: 0;
        }

        .card-header {
            height: 33px;
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-bottom: 2px solid var(--accent-cyan);
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .stat-labels {
            display: flex;
            padding: 10px 25px 5px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-name {
            flex: 2;
            color: #fff;
            opacity: 0.6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .label-stat {
            flex: 0.6;
            text-align: center;
            color: #fff;
            opacity: 0.6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .batting-body {
            position: relative;
        }

        .batting-row {
            display: flex;
            align-items: center;
            padding: 8px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(14, 4, 35, 0.2);
            backdrop-filter: blur(8px);
            opacity: 0;
        }

        .player-info {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        .player-role {
            color: var(--accent-cyan);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .player-name {
            color: #fff;
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-val {
            flex: 0.6;
            text-align: center;
            color: #fff;
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.45);
            padding: 4px 0;
            border-radius: 4px;
            margin: 0 2px;
        }

        .stat-val.runs {
            color: var(--accent-yellow);
            font-size: 26px;
        }

        .footer-strip {
            padding: 2px 25px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(0, 190, 241, 0.3);
        }

        .footer-stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
            opacity: 0;
        }

        .footer-lbl {
            color: #fff;
            opacity: 0.6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .footer-val {
            color: #fff;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
        }

        .footer-val.highlight {
            color: var(--accent-pink);
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div id="batting-card">
        <div class="card-header">
            <div class="header-title">Batting Card</div>
        </div>
        <div class="batting-body">
            <div class="stat-labels">
                <div class="label-name">Players</div>
                <div class="label-stat">R</div>
                <div class="label-stat">B</div>
                <div class="label-stat">4s</div>
                <div class="label-stat">6s</div>
                <div class="label-stat">SR</div>
            </div>
            <div id="rows-inject-point"></div>
        </div>
        <div class="footer-strip" id="footer">
            <div class="footer-stat"><span class="footer-lbl">Total</span><span class="footer-val highlight"
                    id="f-score">0/0</span></div>
            <div class="footer-stat"><span class="footer-val" id="f-overs">0.0</span><span
                    class="footer-lbl">Overs</span></div>
            <div class="footer-stat"><span class="footer-lbl">CRR</span><span class="footer-val" id="f-crr">0.00</span>
            </div>
        </div>
    </div>

    <script>
        let isVisible = false;

        window.show = function (data) {
            // 1. Core State reset
            isVisible = true;
            const card = document.getElementById('batting-card');
            gsap.killTweensOf(card);

            // 2. Load Data First
            if (data) window.updateGraphic(data);

            // 3. Setup Animation Elements
            const rows = document.querySelectorAll('.batting-row');
            const header = document.querySelector('.card-header');
            const footer = document.querySelector('.footer-strip');
            const footerStats = document.querySelectorAll('.footer-stat');
            const labels = document.querySelector('.stat-labels');

            gsap.killTweensOf([rows, header, footer, footerStats, labels]);

            // 4. Initial Hidden States
            gsap.set(card, { visibility: 'visible', opacity: 0 });
            gsap.set(rows, { opacity: 0, x: -50 });
            gsap.set(header, { scaleX: 0, transformOrigin: 'left' });
            gsap.set(labels, { opacity: 0 });
            gsap.set(footer, { opacity: 0 });
            gsap.set(footerStats, { opacity: 0, x: -20 });

            // 5. Play Timeline
            const tl = gsap.timeline({ defaults: { ease: 'power4.out', duration: 1.0 } });
            tl.to(card, { opacity: 1 })
                .to(header, { scaleX: 1, duration: 0.6 }, '-=0.6')
                .to(labels, { opacity: 1, duration: 0.4 }, '-=0.3')
                .to(rows, { opacity: 1, x: 0, stagger: 0.15, duration: 0.7, ease: 'back.out(1.2)' }, '-=0.2')
                .to(footer, { opacity: 1, duration: 0.5 }, '-=0.4')
                .to(footerStats, { opacity: 1, x: 0, stagger: 0.08, duration: 0.5 }, '-=0.3');
        };

        window.hide = function () {
            isVisible = false;
            gsap.to('#batting-card', {
                opacity: 0, duration: 0.5, onComplete: () => {
                    gsap.set('#batting-card', { visibility: 'hidden' });
                }
            });
        };

        window.updateGraphic = function (payload) {
            const data = payload.data || payload;
            const container = document.getElementById('rows-inject-point');
            if (container) {
                container.innerHTML = '';
                const batters = data.batters || data.batting || [];
                batters.slice(0, 2).forEach(b => {
                    const row = document.createElement('div');
                    row.className = 'batting-row';
                    row.innerHTML = `<div class="player-info"><span class="player-role">${b.isStriker ? 'Striker' : (b.isNonStriker ? 'Non-Striker' : 'Batter')}</span><span class="player-name">${b.playerName}</span></div><div class="stat-val runs">${b.runs ?? 0}</div><div class="stat-val">${b.balls ?? 0}</div><div class="stat-val">${b.fours ?? 0}</div><div class="stat-val">${b.sixes ?? 0}</div><div class="stat-val sr">${parseInt(b.strikeRate || 0)}</div>`;
                    container.appendChild(row);
                });
            }

            const sc = data.scoreboard || {};
            if (document.getElementById('f-score')) document.getElementById('f-score').textContent = (sc.total_run ?? 0) + '/' + (sc.total_wickets ?? 0);
            if (document.getElementById('f-overs')) document.getElementById('f-overs').textContent = sc.actualOvers ?? sc.currentOverNumber ?? '0.0';

            const runs = sc.total_run || 0;
            const oversStr = (sc.actualOvers ?? sc.currentOverNumber ?? "0.0").toString();
            let dec = 0; if (oversStr.includes('.')) { const p = oversStr.split('.'); dec = parseInt(p[0]) + (parseInt(p[1]) / 6); } else { dec = parseFloat(oversStr); }
            if (document.getElementById('f-crr')) document.getElementById('f-crr').textContent = dec > 0 ? (runs / dec).toFixed(2) : "0.00";

            // If card is already on screen, animate the NEW rows specifically
            if (isVisible) {
                const newRows = document.querySelectorAll('.batting-row');
                gsap.to(newRows, { opacity: 1, x: 0, stagger: 0.1, duration: 0.6, ease: 'power2.out' });
            }
        };

        window.onload = async () => {
            let matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase1/batting-card/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    window.updateGraphic(json.data || json);
                }
            } catch (e) { }
        };
        window.addEventListener('message', (e) => { if (e.data === 'HIDE') window.hide(); });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'batting_card' || p.graphic === 'batting-card') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) window.updateGraphic(p.data);
                    const card = document.getElementById('batting-card');
                    if (window.getComputedStyle(card).visibility === 'hidden') {
                        window.show(p.data);
                    }
                } else if (p.type === 'hide') {
                    window.hide();
                }
            }
        });
    </script>
</body>

</html>
