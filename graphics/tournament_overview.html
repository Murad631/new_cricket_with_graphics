<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Tournament Overview - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: rgba(0, 0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            z-index: 100;
        }

        #ov-master {
            width: min(1200px, calc(100vw - 60px));
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 0;
            opacity: 0;
            transform: scale(0.96);
            position: relative; 

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #ov-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #ov-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .ov-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .ov-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .ov-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .ov-header-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .ov-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 400px; /* changed from height:400px to allow content to grow */
            background: var(--master-grad); position: relative; padding: 20px;
            gap: 20px;
        }

        /* POOL BOXES */
        .pool-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            padding: 15px;
            opacity: 0;
            transform: translateY(0px);
            position: relative; z-index: 1;
            transition: background 0.3s ease;
        }

        .pool-box:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .pool-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 5px;
        }

        .pool-name {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pool-info {
            font-size: 10px;
            color: var(--accent-cyan);
            font-weight: 700;
            text-transform: uppercase;
        }

        .team-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .t-chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid var(--glass-border);
        }

        .ov-fixture-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 60px; /* high safety margin for last row visibility */
        }

        .ov-fix-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); /* tight divider */
            font-size: 12px;
            font-family: var(--font-body);
            color: var(--text-muted);
            transition: background 0.2s ease;
            position: relative;
        }

        .ov-fix-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
        }

        .ov-fix-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .ov-fix-teams {
            color: var(--text-white);
            font-weight: 700;
            font-size: 13px;
        }

        .ov-footer {
            height: 32px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            position: relative; 
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .ov-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .ov-meta {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: tournament_overview.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas">
        <div id="ov-master">
            <div class="ov-header">
                <div class="ov-header-title">Tournament Overview</div>
                <div style="font-size:11px; color:rgba(255,255,255,0.5); font-weight:700; letter-spacing:2px">ASIA CUP
                    2026</div>
            </div>

            <div class="ov-body">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png" class="sc-watermark" alt="Watermark">
                <!-- Pool A -->
                <div class="pool-box">
                    <div class="pool-hdr">
                        <span class="pool-name">Pool A</span>
                        <span class="pool-info">3 Teams Â· Group 1</span>
                    </div>
                    <div class="team-chips">
                        <div class="t-chip">Pakistan</div>
                        <div class="t-chip">India</div>
                        <div class="t-chip">S. Africa</div>
                    </div>
                    <div class="ov-fixture-list">
                        <div class="ov-fix-row"><span class="ov-fix-teams">PAk vs IND</span><span>M1 Compl</span></div>
                        <div class="ov-fix-row"><span class="ov-fix-teams">PAK vs RSA</span><span>M2 Tomorrow</span>
                        </div>
                        <div class="ov-fix-row"><span class="ov-fix-teams">IND vs RSA</span><span>M3 TBC</span></div>
                    </div>
                </div>

                <!-- Pool B -->
                <div class="pool-box">
                    <div class="pool-hdr">
                        <span class="pool-name">Pool B</span>
                        <span class="pool-info">3 Teams Â· Group 2</span>
                    </div>
                    <div class="team-chips">
                        <div class="t-chip">Australia</div>
                        <div class="t-chip">N. Zealand</div>
                        <div class="t-chip">W. Indies</div>
                    </div>
                    <div class="ov-fixture-list">
                        <div class="ov-fix-row"><span class="ov-fix-teams">AUS vs NZL</span><span>M4 Compl</span></div>
                        <div class="ov-fix-row"><span class="ov-fix-teams">AUS vs WIN</span><span>M5 Live</span></div>
                        <div class="ov-fix-row"><span class="ov-fix-teams">NZL vs WIN</span><span>M6 TBC</span></div>
                    </div>
                </div>
            </div>

            <div class="ov-footer">
                <div class="ov-meta">T20 International Tournament â€¢ Dubai Rings</div>
            </div>
        </div>
    </div>

    <script>
        function show() {
            const tl = gsap.timeline();

            tl.fromTo('#ov-master',
                { opacity: 0, scale: 0.95, y: 0 },
                { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: 'power3.out' }
            )
                .fromTo('.pool-box',
                    { opacity: 0, y: 0 },
                    { opacity: 1, y: 0, duration: 0.6, stagger: 0.2, ease: 'power2.out' },
                    '-=0.4'
                )
                .fromTo('.t-chip',
                    { opacity: 0, scale: 0.8 },
                    { opacity: 1, scale: 1, duration: 0.4, stagger: 0.05 },
                    '-=0.2'
                );
        }

        document.addEventListener('DOMContentLoaded', show);
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const tl = gsap.timeline();
            tl.to('.t-chip', { opacity: 0, scale: 0.8, duration: 0.25, stagger: 0.03, ease: 'power2.in' })
              .to('.pool-box', { opacity: 0, duration: 0.4, stagger: 0.1, ease: 'power2.in' }, '-=0.2')
              .to('#ov-master', { opacity: 0, scale: 0.95, duration: 0.6, ease: 'power3.in' }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
