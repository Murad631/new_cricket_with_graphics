<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=950, height=350">
    <title>Fantasy Impact - Crystal Glassy</title>














    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c;
            /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 54px 0 115px;
            /* keep above bottom scoreboard/lower-third */
            box-sizing: border-box;
            margin: 0;
        }

        .broadcast-canvas-scaled {
            width: 950px;
            height: 350px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #fantasy-master {
            width: 900px;
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            position: relative;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 15px 35px rgba(0, 0, 0, 0.4),
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #fantasy-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #fantasy-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.00) 30%,
                    rgba(255, 255, 255, 0.05) 48%,
                    rgba(255, 255, 255, 0.11) 50%,
                    rgba(255, 255, 255, 0.05) 52%,
                    rgba(255, 255, 255, 0.00) 70%,
                    transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0% {
                left: -120%;
                opacity: 0;
            }

            8% {
                opacity: 1;
            }

            50% {
                left: 140%;
                opacity: 1;
            }

            58% {
                opacity: 0;
            }

            100% {
                left: 140%;
                opacity: 0;
            }
        }

        .fantasy-header {
            background: linear-gradient(90deg, #7000ff 0%, var(--accent-pink) 100%);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: relative;
            border-bottom: 2px solid var(--accent-yellow);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .fantasy-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.65) 20%,
                    rgba(255, 255, 255, 0.88) 50%,
                    rgba(255, 255, 255, 0.65) 80%,
                    transparent 100%);
            z-index: 5;
        }

        .fantasy-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .fantasy-header-title {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .fantasy-body {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: var(--master-grad);
            position: relative;
            gap: 15px;
        }

        /* PLAYER CARDS */
        .fantasy-player-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            position: relative;
            opacity: 0;
            transform: scale(0.9);
        }

        .fantasy-player-card.top::after {
            content: 'TOP PICK';
            position: absolute;
            top: -10px;
            background: var(--accent-yellow);
            color: #000;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 10px;
            letter-spacing: 1px;
        }

        .f-photo-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent-pink);
            overflow: hidden;
            background: #000;
            margin-bottom: 12px;
        }

        .f-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .f-name {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--text-white);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2px;
        }

        .f-points {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--accent-yellow);
            line-height: 1;
        }

        .f-lbl {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .f-stats {
            margin-top: 10px;
            font-size: 10px;
            color: var(--accent-cyan);
            font-weight: 700;
            text-align: center;
        }

        .fantasy-footer {
            height: 35px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .fantasy-footer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.12) 30%,
                    rgba(255, 255, 255, 0.22) 50%,
                    rgba(255, 255, 255, 0.12) 70%,
                    transparent 100%);
        }

        .fantasy-meta {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: fantasy_impact.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }

        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * {
            box-shadow: none !important;
        }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas-scaled">
        <div id="fantasy-master">
            <div class="fantasy-header">
                <div class="fantasy-header-title">Fantasy Impact</div>
                <div style="font-size:11px; color:rgb(255, 255, 255); font-weight:700; letter-spacing:2px">DREAM 11
                    LEADERBOARD</div>
            </div>

            <div class="fantasy-body">
                <!-- Player 1 -->
                <div class="fantasy-player-card top">
                    <div class="f-photo-wrap"><img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png"
                            alt="P1"></div>
                    <div class="f-name">Hardik Pandya</div>
                    <div class="f-points">142</div>
                    <div class="f-lbl">POINTS</div>
                    <div class="f-stats">40 Runs | 2 Wkts</div>
                </div>

                <!-- Player 2 -->
                <div class="fantasy-player-card">
                    <div class="f-photo-wrap"><img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png"
                            alt="P2"></div>
                    <div class="f-name">Virat Kohli</div>
                    <div class="f-points">118</div>
                    <div class="f-lbl">POINTS</div>
                    <div class="f-stats">82 Runs | 2 Catch</div>
                </div>

                <!-- Player 3 -->
                <div class="fantasy-player-card">
                    <div class="f-photo-wrap"><img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png"
                            alt="P3"></div>
                    <div class="f-name">Shaheen Afridi</div>
                    <div class="f-points">95</div>
                    <div class="f-lbl">POINTS</div>
                    <div class="f-stats">2 Wkts | 1 Maiden</div>
                </div>

                <!-- Player 4 -->
                <div class="fantasy-player-card">
                    <div class="f-photo-wrap"><img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png"
                            alt="P4"></div>
                    <div class="f-name">Jasprit Bumrah</div>
                    <div class="f-points">88</div>
                    <div class="f-lbl">POINTS</div>
                    <div class="f-stats">3 Wickets</div>
                </div>
            </div>

            <div class="fantasy-footer">
                <div class="fantasy-meta">Official Fantasy Points • Match 01 Finalized</div>
            </div>
        </div>
    </div>

    <script>
        function show() {
            const tl = gsap.timeline();

            tl.fromTo('#fantasy-master',
                { opacity: 0, scale: 0.95, y: 0 },
                { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: 'expo.out' }
            )
                .fromTo('.fantasy-player-card',
                    { opacity: 0, scale: 0.88, y: 0 },
                    { opacity: 1, scale: 1, y: 0, duration: 0.6, stagger: 0.15, ease: 'back.out(1.4)' },
                    '-=0.4'
                );
        }

        document.addEventListener('DOMContentLoaded', show);
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const tl = gsap.timeline();
            tl.to('.fantasy-player-card', { opacity: 0, x: 20, duration: 0.32, stagger: 0.05, ease: 'power2.in' })
                .to('#fantasy-master', { opacity: 0, scale: 0.95, y: 20, duration: 0.7, ease: 'power3.in' }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
