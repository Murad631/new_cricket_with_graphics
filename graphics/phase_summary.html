<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Phase Summary - ICC Broadcast</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 54px;
            padding-bottom: 115px; /* keep above bottom scoreboard/lower-third */
            box-sizing: border-box;
        }

        /* PHASE SUMMARY CONTAINER: 1000px wide (Centered) */
        #phase-summary {
            width: 600px;
            background-color: var(--primary-navy);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            position: relative; transform: translateY(0px);
            opacity: 0;
            /* box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); */
            overflow: hidden;
        }

        /* Topographic pattern from index.html */
        #phase-summary::before {
            content: '';
            position: absolute;
            inset: 0;
background-size: 250px 250px;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Pink Header (35px-40px height) */
        .phase-header {
            height: 38px;
            background: linear-gradient(90deg, var(--accent-pink), #ff30a1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            position: relative; z-index: 10;
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* Main Content */
        .phase-body {
            padding: 30px 50px 50px;
            position: relative; z-index: 5;
            text-align: center;
            background: var(--master-grad); position: relative; }

        .match-meta {
            color: var(--accent-cyan);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        /* Grid: 3-Column established in final.html */
        .phase-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .phase-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-top: 3px solid var(--accent-yellow);
            padding: 25px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .phase-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .phase-val {
            font-family: var(--font-display);
            font-size: 64px;
            font-weight: 900;
            color: var(--accent-yellow);
            line-height: 1;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: phase_summary.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>
    <div id="safe-area" aria-hidden="true"></div>

    <div class="broadcast-canvas">
        <div id="phase-summary">
            <!-- Header -->
            <div class="phase-header">
                <div class="header-title" id="phase-name">Powerplay Summary (1-6)</div>
            </div>

            <div class="phase-body">
                <div class="match-meta" id="match-meta">India vs Pakistan Â· Melbourne</div>

                <div class="phase-grid">
                    <!-- Runs Box -->
                    <div class="phase-box">
                        <div class="phase-label">Runs</div>
                        <div class="phase-val" id="val-runs">54</div>
                    </div>

                    <!-- Wickets Box -->
                    <div class="phase-box">
                        <div class="phase-label">Wickets</div>
                        <div class="phase-val" id="val-wickets">1</div>
                    </div>

                    <!-- RR Box -->
                    <div class="phase-box">
                        <div class="phase-label">Run Rate</div>
                        <div class="phase-val" id="val-rr">9.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === PARSE URL PARAMS ===
        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('matchId');
        const inningsId = params.get('inningsId');
        const start = params.get('start') ?? 0;
        const end = params.get('end') ?? 5;

        function calcRR(runs, oversStr) {
            const parts = String(oversStr).split('.');
            const totalBalls = parseInt(parts[0] || 0) * 6 + parseInt(parts[1] || 0);
            if (totalBalls === 0) return '0.00';
            return ((runs / totalBalls) * 6).toFixed(2);
        }

        function populateData(data) {
            document.getElementById('phase-name').textContent = data.phaseName || 'Phase Summary';
            document.getElementById('match-meta').textContent = data.teamName || '';
            document.getElementById('val-runs').textContent = data.runs ?? '-';
            document.getElementById('val-wickets').textContent = data.wickets ?? '-';
            document.getElementById('val-rr').textContent = calcRR(data.runs, data.overs);
        }

        async function fetchAndRender() {
            if (!matchId || !inningsId) return;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase-summary/${matchId}/${inningsId}?start=${start}&end=${end}`);
                const json = await res.json();
                if (json && json.data) populateData(json.data);
            } catch (e) {
                console.error('Phase summary fetch error:', e);
            }
        }

        function show() {
            const tl = gsap.timeline({ defaults: { ease: "power3.out", duration: 0.8 } });

            gsap.set("#phase-summary", { opacity: 0, scale: 0.95, y: 0 });
            gsap.set(".phase-box", { opacity: 0, y: 0 });
            gsap.set(".match-meta", { opacity: 0, y: 0 });

            tl.to("#phase-summary", { opacity: 1, scale: 1, duration: 0.6 })
                .to(".match-meta", { opacity: 1 }, "-=0.2")
                .to(".phase-box", { opacity: 1, stagger: 0.15 }, "-=0.3");
        }

        function hide() {
            const tl = gsap.timeline();
            tl.to('.phase-box', { opacity: 0, y: 0, duration: 0.3, stagger: 0.05, ease: 'power2.in' })
              .to('#phase-summary', { opacity: 0, scale: 0.95, y: 0, duration: 0.5, ease: 'power2.in' }, '-=0.2');
        }

        window.onload = async () => {
            await fetchAndRender();
            show();
        };

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
