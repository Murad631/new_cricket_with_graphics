<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Phase Summary - Broadcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --accent-pink: #ed008c;
            --accent-cyan: #00bef1;
            --accent-yellow: #fded00;
            --font-display: 'Oswald', sans-serif;
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 54px;
        }

        #phase-summary {
            width: 600px;
            background-color: var(--primary-navy);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 0; /* Hidden by default */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .phase-header {
            height: 38px;
            background: linear-gradient(90deg, var(--accent-pink), #ff30a1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--accent-cyan);
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .phase-body {
            padding: 30px 50px 50px;
            text-align: center;
            background: var(--master-grad);
        }

        .match-meta {
            color: var(--accent-cyan);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        .phase-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .phase-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent-yellow);
            padding: 25px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phase-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .phase-val {
            font-family: var(--font-display);
            font-size: 58px;
            font-weight: 900;
            color: var(--accent-yellow);
            line-height: 1;
        }
    </style>
</head>

<body>
    <div id="phase-summary">
        <div class="phase-header">
            <div class="header-title" id="main-phase-header">LOADING...</div>
        </div>
        <div class="phase-body">
            <div class="match-meta" id="match-meta">...</div>
            <div class="phase-grid">
                <div class="phase-box">
                    <div class="phase-label">Runs</div>
                    <div class="phase-val" id="val-runs">0</div>
                </div>
                <div class="phase-box">
                    <div class="phase-label">Wickets</div>
                    <div class="phase-val" id="val-wickets">0</div>
                </div>
                <div class="phase-box">
                    <div class="phase-label">Run Rate</div>
                    <div class="phase-val" id="val-rr">0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global element reference
        const master = document.getElementById('phase-summary');

        // === DATA BINDING ===
        window.updateGraphic = function(data) {
            console.log("🔥 Binding Data:", data);
            try {
                if (!data) return;
                
                const pName = data.phaseName || data.phase_name || "PHASE SUMMARY";
                document.getElementById('main-phase-header').innerText = pName;
                
                const meta = data.matchMeta || data.teamName || "...";
                document.getElementById('match-meta').innerText = meta;
                
                if (data.runs !== undefined) document.getElementById('val-runs').textContent = data.runs;
                if (data.wickets !== undefined) document.getElementById('val-wickets').textContent = data.wickets;
                if (data.runRate !== undefined) document.getElementById('val-rr').textContent = data.runRate;
            } catch (e) {
                console.error("❌ Binding Error:", e);
            }
        };

        // === SHOW ANIMATION ===
        function show() {
            try {
                console.log("🎬 Triggering Show Animation");
                gsap.killTweensOf([master, ".match-meta", ".phase-box"]);

                // Direct override to ensure visibility
                master.style.opacity = "1";

                const tl = gsap.timeline();
                tl.fromTo(master, 
                    { scale: 0.95, y: -20 }, 
                    { scale: 1, y: 0, duration: 0.5, ease: "back.out(1.7)" }
                )
                .fromTo(".match-meta", 
                    { opacity: 0, y: 5 },
                    { opacity: 1, y: 0, duration: 0.3 }, "-=0.2"
                )
                .fromTo(".phase-box", 
                    { opacity: 0, y: 10 },
                    { opacity: 1, y: 0, duration: 0.4, stagger: 0.1 }, "-=0.2"
                );
            } catch (e) {
                console.error("❌ GSAP Error:", e);
                master.style.opacity = "1"; // Fallback: just show it
            }
        }

        window.hide = function() {
            gsap.to(master, { opacity: 0, scale: 0.95, duration: 0.4 });
        }

        // Onload fetch
        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId');
            if (matchId) {
                try {
                    const res = await fetch(`http://localhost:3000/api/graphics/phase-summary/${matchId}/1?start=0&end=5&_t=${Date.now()}`);
                    if (res.ok) {
                        const json = await res.json();
                        window.updateGraphic(json.data || json);
                        show();
                    }
                } catch (e) {}
            }
        };
    </script>

    <!-- Handle postMessage from canvas.html (iframe parent) -->
    <script>
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (!msg) return;

            // String 'HIDE' from canvas
            if (msg === 'HIDE') { window.hide(); return; }

            // Object { type: 'SHOW', data: {...} } from canvas.html on first load
            // Object { type: 'UPDATE', data: {...} } from canvas.html on subsequent triggers
            if (msg.type === 'SHOW' || msg.type === 'UPDATE') {
                console.log("📨 postMessage from canvas:", msg.type, msg.data);
                if (msg.data) window.updateGraphic(msg.data);
                show();
            }

            if (msg.type === 'HIDE') { window.hide(); }
        });
    </script>

    <!-- Socket for direct usage (when NOT inside canvas.html iframe) -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        try {
            const socket = io('http://localhost:3000');
            socket.on('connect', () => console.log("✅ WebSocket Connected"));
            
            socket.on('graphic_event', (p) => {
                console.log("📡 Socket Event:", p);
                if (p.graphic === 'phase_summary') {
                    if (p.type === 'update' || p.type === 'show') {
                        if (p.data) window.updateGraphic(p.data);
                        show();
                    } else if (p.type === 'hide') {
                        window.hide();
                    }
                }
            });
        } catch (err) {
            console.error("❌ Socket Init Error:", err);
        }
    </script>
</body>
</html>
