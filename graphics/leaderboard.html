<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Tournament Leaderboard - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            z-index: 100;
        }

        #lb-master {
            width: fit-content;
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            max-height: calc(100vh - 54px - 115px);
            opacity: 0;
            position: relative; 

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #lb-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #lb-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .lb-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .lb-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .lb-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .lb-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
        }

        .lb-subtitle {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
            opacity: 0.8;
        }

        .lb-grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--master-grad); position: relative; }

        .lb-table-head {
            display: grid;
            grid-template-columns: 60px 380px 100px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: stretch;
            padding: 0 15px;
        }

        .lb-table-head > div {
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
        }

        .lb-table-head > div:nth-child(2) {
            justify-content: flex-start;
            padding-left: 20px;
        }

        .lb-table-head > div:last-child {
            border-right: none;
        }

        .lb-th {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: var(--font-body);
        }

        .lb-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 60px; /* high safety margin for last row visibility */
        }

        .lb-row {
            display: grid;
            grid-template-columns: 60px 380px 100px;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); /* tight divider */
            align-items: stretch;
            opacity: 0;
            transition: background 0.2s ease;
            position: relative;
            z-index: 1;
        }

        /* tight crystal: per-row micro glass sheen */
        .lb-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.022) 0%,
                    transparent 50%,
                    rgba(0, 0, 0, 0.05) 100%);
        }

        .lb-row > div {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 10px;
        }

        .lb-row > div:nth-child(2) {
            justify-content: flex-start;
            padding-left: 20px;
        }

        .lb-row > div:last-child {
            border-right: none;
        }

        .lb-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .lb-row.highlight {
            background: rgba(0, 190, 241, 0.1);
            position: relative; }

        .lb-row.highlight::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--accent-yellow);
            z-index: 10;
        }

        .lb-rank {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--text-white);
            font-weight: 500;
        }

        .lb-team-flag {
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .lb-name {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 600;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            width: 100%;
        }

        .lb-team-code {
            opacity: 0.6;
            font-size: 14px;
            margin-left: 8px;
            font-family: var(--font-body);
        }

        .lb-value {
            font-family: var(--font-mono);
            font-size: 24px;
            color: var(--accent-yellow);
            font-weight: 900;
            text-align: center;
        }

        .lb-footer {
            height: 32px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            position: relative; 
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .lb-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .footer-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: leaderboard.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>
<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas">
        <div id="lb-master">
            <div class="lb-header">
                <div class="lb-title" id="lb-title">TOURNAMENT LEADERS</div>
                <div class="lb-subtitle" id="lb-subtitle">ICC T20 WORLD CUP 2026</div>
            </div>

            <div class="lb-grid-wrapper">
                <div class="lb-table-head">
                    <div class="lb-th">Rank</div>
                    <div class="lb-th">Player</div>
                    <div class="lb-th">Sixes</div>
                </div>
                <div class="lb-list" id="lb-list">
                    <!-- Rows injected by JavaScript -->
                </div>
            </div>

            <div class="lb-footer">
                <div class="footer-text" id="lb-meta">CRYSTAL ANALYTICS &bull; LIVE BROADCAST FEED</div>
            </div>
        </div>
    </div>

    <script>
        const leaderboardData = [
            { rank: 1, name: "Suryakumar Yadav", team: "IND", value: "18", highlight: true, flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313128.logo.png" },
            { rank: 2, name: "Nicholas Pooran", team: "WI", value: "15", highlight: false, flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313158.logo.png" },
            { rank: 3, name: "Virat Kohli", team: "IND", value: "12", highlight: false, flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313128.logo.png" },
            { rank: 4, name: "Jos Buttler", team: "ENG", value: "11", highlight: false, flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313136.logo.png" },
            { rank: 5, name: "David Warner", team: "AUS", value: "10", highlight: false, flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313125.logo.png" }
        ];

        function initLeaderboard() {
            const list = document.getElementById('lb-list');
            list.innerHTML = '';
            leaderboardData.forEach(p => {
                const row = document.createElement('div');
                row.className = `lb-row ${p.highlight ? 'highlight' : ''}`;
                row.innerHTML = `
                    <div class="lb-rank">${p.rank}</div>
                    <div class="lb-name">
                        <img src="${p.flag}" class="lb-team-flag" alt="${p.team}">
                        <span>${p.name} <span class="lb-team-code">${p.team}</span></span>
                    </div>
                    <div class="lb-value">${p.value}</div>
                `;
                list.appendChild(row);
            });

            gsap.timeline()
                .fromTo('#lb-master', 
                    { opacity: 0, y: 0, scaleX: 0.95 },
                    { opacity: 1, y: 0, scaleX: 1, duration: 0.8, ease: 'power3.out' }
                )
                .fromTo('.lb-row', 
                    { opacity: 0, x: -10 },
                    { opacity: 1, x: 0, stagger: 0.1, duration: 0.4, ease: 'power2.out' },
                    '-=0.4'
                );
        }
        function hide() {
            const tl = gsap.timeline();
            tl.to('.lb-row', { opacity: 0, x: -10, duration: 0.3, stagger: 0.03, ease: 'power2.in' })
              .to('#lb-master', { opacity: 0, scale: 0.95, y: 30, duration: 0.5, ease: 'power2.in' }, '-=0.2');
        }


        window.onload = initLeaderboard;
    
    

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>
</html>
