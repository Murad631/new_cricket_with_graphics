<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Over Summary - ICC Broadcast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --accent-pink: #ed008c;
            --accent-cyan: #00bef1;
            --accent-yellow: #fded00;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
            --run-4-grad: linear-gradient(145deg, #0082AB 0%, #00C1E4 100%);
            --run-6-grad: linear-gradient(145deg, #71309F 0%, #A855F7 100%);
            --wicket-bg: linear-gradient(145deg, #DC2626 0%, #EF4444 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100vw; height: 100vh;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 60px 100px 115px;
        }

        .over-summary {
            width: 510px;
            background-color: var(--primary-navy);
            position: relative; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 6px solid var(--accent-pink);
            opacity: 0; /* Hidden by default */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .header {
            height: 38px;
            background: linear-gradient(90deg, var(--accent-pink), #ff30a1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--accent-cyan);
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .balls-container {
            padding: 25px 30px;
            background: var(--master-grad);
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 12px;
        }

        .ball-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: rgba(255, 255, 255, .1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        .ball-circle.run-4 { background: var(--run-4-grad); border-color: var(--accent-cyan); }
        .ball-circle.run-6 { background: var(--run-6-grad); border-color: #C87EF0; }
        .ball-circle.wicket { background: var(--wicket-bg); border-color: #fff; }

        .footer {
            height: 40px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-item { display: flex; align-items: center; gap: 8px; }
        .footer-lbl {
            color: var(--accent-yellow);
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer-val {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }
        .footer-val b { color: var(--accent-cyan); }
    </style>
</head>

<body>
    <div class="over-summary" id="over-main">
        <div class="header">
            <div class="header-title" id="main-over-header">END OF OVER 0</div>
        </div>
        <div class="balls-container" id="balls-grid">
            <!-- Dynamic balls here -->
        </div>
        <div class="footer">
            <div class="footer-item">
                <span class="footer-lbl">Runs</span>
                <span class="footer-val" id="val-runs">0</span>
            </div>
            <div class="footer-item">
                <span class="footer-lbl">Bowler</span>
                <span class="footer-val" id="val-bowler"><b>...</b></span>
            </div>
            <div class="footer-item">
                <span class="footer-lbl">Total</span>
                <span class="footer-val" id="val-total">0/0</span>
            </div>
        </div>
    </div>

    <script>
        const master = document.getElementById('over-main');

        window.updateGraphic = function(data) {
            console.log("🔥 BINDING OVER DATA:", data);
            if (!data) return;

            document.getElementById('main-over-header').innerText = data.headerTitle || "OVER SUMMARY";
            document.getElementById('val-runs').innerText = data.runs || 0;
            document.getElementById('val-bowler').innerHTML = `<b>${data.bowlerName || 'Bowler'}</b>`;
            document.getElementById('val-total').innerText = data.totalScore || '0/0';

            // Rebuild Balls
            const grid = document.getElementById('balls-grid');
            grid.innerHTML = '';
            const balls = data.balls || [];
            balls.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'ball-circle';
                div.innerText = sym;
                
                if (sym == '4') div.classList.add('run-4');
                if (sym == '6') div.classList.add('run-6');
                if (sym.toString().toUpperCase().includes('W') && !sym.toString().toUpperCase().includes('D')) {
                    div.classList.add('wicket');
                }
                grid.appendChild(div);
            });

            // Force visibility immediately
            master.style.opacity = "1";
        };

        function show() {
            // Delay slightly to allow DOM to finish rendering balls
            setTimeout(() => {
                try {
                    gsap.killTweensOf([master, ".ball-circle", ".footer-item"]);
                    master.style.opacity = "1";

                    const tl = gsap.timeline();
                    tl.fromTo(master, 
                        { scale: 0.9, y: 20 },
                        { scale: 1, y: 0, duration: 0.5, ease: "back.out(1.7)" }
                    ).fromTo(".ball-circle", 
                        { scale: 0, opacity: 0 },
                        { scale: 1, opacity: 1, duration: 0.4, stagger: 0.08, ease: "back.out(2)" }, "-=0.2"
                    ).fromTo(".footer-item", 
                        { opacity: 0, x: -10 },
                        { opacity: 1, x: 0, duration: 0.4, stagger: 0.1 }, "-=0.3"
                    );
                } catch (e) {
                    master.style.opacity = "1";
                }
            }, 50);
        }

        window.hide = function() {
            gsap.to(master, { opacity: 0, scale: 0.9, y: 20, duration: 0.4 });
        }

        // Parent Message Listener
        window.addEventListener('message', (e) => {
            const m = e.data;
            if (m === 'HIDE') { window.hide(); return; }
            if (m.type === 'SHOW' || m.type === 'UPDATE') {
                if (m.data) window.updateGraphic(m.data);
                show();
            }
        });

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const mid = params.get('matchId');
            if (mid) {
                try {
                    const res = await fetch(`http://localhost:3000/api/graphics/over-summary/trigger/${mid}/${params.get('inningsId')||1}/${params.get('overNumber')||0}`);
                    if (res.ok) {
                        const json = await res.json();
                        window.updateGraphic(json.data || json);
                        show();
                    }
                } catch(e) {}
            }
        };
    </script>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        try {
            const socket = io('http://localhost:3000');
            socket.on('graphic_event', (p) => {
                if (p.graphic === 'over_summary' && (p.type === 'update' || p.type === 'show')) {
                    if (p.data) window.updateGraphic(p.data);
                    show();
                } else if (p.graphic === 'over_summary' && p.type === 'hide') {
                    window.hide();
                }
            });
        } catch(e) {}
    </script>
</body>
</html>
