<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC T20 WC 2026 - Over Summary</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── BALL EVENT COLORS ── */
            --run-4-grad: linear-gradient(145deg, #0082AB 0%, #00C1E4 100%);
            --run-6-grad: linear-gradient(145deg, #71309F 0%, #A855F7 100%);
            --wicket-bg: linear-gradient(145deg, #DC2626 0%, #EF4444 100%);
            --header-grad: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            /* Keep above bottom scoreboard/lower-third */
            padding: 60px 100px 115px;
            /* Safe Area matched with bowling panel */
        }

        .over-summary {
            width: 510px;
            background-color: var(--primary-navy);
            position: relative; border: 1px solid rgba(255, 255, 255, 0.15);
            visibility: hidden;
            border-bottom: 4px solid var(--accent-pink);
        }

        .over-summary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(168deg, rgba(77, 3, 167, 0.9) 0%, rgba(47, 2, 106, 0.98) 100%);
            z-index: 0;
        }

        .header {
            height: 35px;
            background: linear-gradient(90deg, var(--accent-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; z-index: 10;
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
        }

        .balls-container {
            position: relative; z-index: 5;
            padding: 30px 0;
            background: var(--master-grad); position: relative; border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balls-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .ball-circle {
            width: 43px;
            height: 43px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            background: rgba(255, 255, 255, .08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
        }

        .ball-circle.run-4 {
            background: var(--run-4-grad);
            border-color: #6AAFF8;
            box-shadow: 0 0 20px rgba(0, 130, 171, 0.4);
        }

        .ball-circle.run-6 {
            background: var(--run-6-grad);
            border-color: #C87EF0;
            box-shadow: 0 0 20px rgba(113, 48, 159, 0.4);
        }

        .ball-circle.wicket {
            background: var(--wicket-bg);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
        }

        .footer {
            height: 31px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            position: relative; z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-lbl {
            color: rgb(255 241 8);
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-val {
            color: #fff;
            font-family: var(--font-mono);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .footer-val b {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .glass-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: var(--glass-shine);
            pointer-events: none;
            z-index: 15;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: over_summary.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>
    <div id="safe-area" aria-hidden="true"></div>
    <div class="over-summary">
        <div class="glass-shine"></div>
        <div class="header">
            <div class="header-title">End of Over 12</div>
        </div>
        <div class="balls-container">
            <div class="balls-row">
                <div class="ball-circle">1</div>
                <div class="ball-circle run-4">4</div>
                <div class="ball-circle">wd</div>
                <div class="ball-circle run-6">6</div>
                <div class="ball-circle wicket">W</div>
                <div class="ball-circle">2</div>
            </div>
        </div>
        <div class="footer">
            <div class="footer-item">
                <span class="footer-lbl">Runs</span>
                <span class="footer-val">14</span>
            </div>
            <div class="footer-item">
                <span class="footer-lbl">Bowler</span>
                <span class="footer-val"><b>Rashid Khan</b></span>
            </div>
            <div class="footer-item">
                <span class="footer-lbl">Total</span>
                <span class="footer-val">98/3</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const summary = document.querySelector('.over-summary');
            const balls = document.querySelectorAll('.ball-circle');
            const header = document.querySelector('.header');
            const footer = document.querySelector('.footer');
            const footerItems = document.querySelectorAll('.footer-item');

            // Set initial state matching final.html pattern
            // Start at final Y to prevent "jumping" on reload.
            gsap.set(summary, { visibility: 'visible', opacity: 0, y: 0 });
            gsap.set(balls, { scale: 0, opacity: 0 });
            gsap.set(header, { scaleX: 0, transformOrigin: 'center' });
            gsap.set(footer, { opacity: 0, y: 0 });
            gsap.set(footerItems, { opacity: 0, x: -20 });

            const tl = gsap.timeline({
                defaults: { ease: 'power4.out', duration: 1.2 }
            });

            tl.to(summary, { opacity: 1 })
                .to(header, { scaleX: 1, duration: 0.8 }, '-=0.8')
                .to(balls, {
                    opacity: 1,
                    scale: 1,
                    duration: 0.7,
                    stagger: 0.1,
                    ease: 'back.out(2)'
                }, '-=0.4')
                .to(footer, { opacity: 1, duration: 0.6 }, '-=0.6')
                .to(footerItems, { opacity: 1, x: 0, stagger: 0.15, duration: 0.6 }, '-=0.4');
        });
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const footerItems = document.querySelectorAll('.footer-item');
            const tl = gsap.timeline({ defaults: { ease: 'power3.in' } });
            tl.to(footerItems, { opacity: 0, x: -20, stagger: 0.06, duration: 0.35 })
                .to('.footer', { opacity: 0, duration: 0.3 }, '-=0.15')
                .to('.ball-circle', { opacity: 0, scale: 0, stagger: 0.06, duration: 0.35, ease: 'power2.in' }, '-=0.2')
                .to('.header', { scaleX: 0, transformOrigin: 'center', duration: 0.45 }, '-=0.15')
                .to('.over-summary', { opacity: 0, duration: 0.5 }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
