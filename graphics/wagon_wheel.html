<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Wagon Wheel - ICC Broadcast</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 1700px;
            height: 1080px;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: -150px;
            margin-top: -150px;
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            z-index: 100;
        }

        /* WAGON CONTAINER: Updated by user to 780x575px */
        #wagon-container {
            width: 780px;
            height: 575px;
            background-color: var(--primary-navy);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            position: relative; transform: translateY(0px);
            opacity: 0;
            margin-top: 0; /* avoid touching bottom scoreboard region */
        }

        /* Pink Header */
        .chart-header {
            height: 30px;
            background: linear-gradient(90deg, var(--accent-pink), #ff30a1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative; z-index: 10;
            border-bottom: 2px solid var(--accent-cyan);
            flex-shrink: 0;
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* Chart Body - Split Layout */
        .chart-body {
            flex: 1;
            position: relative; display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 25px 40px;
            z-index: 5;
            background: var(--master-grad); position: relative; /* User's custom background */
        }

        /* Left Column: Player Portrait & Stats */
        .left-col {
            display: flex;
            flex-direction: column;
            width: 260px;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--accent-cyan);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .player-portrait {
            flex: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            background: rgba(0, 0, 0, 0.2);
            min-height: 0;
        }

        .player-info {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 10px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-name {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-yellow);
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .player-stat {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right Column: Field Area */
        .field-area {
            position: relative; width: 430px;
            height: 430px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wagon-svg {
            width: 100%;
            height: 100%;
            transform-origin: center;
        }

        .field-boundary {
            fill: var(--field-green);
            opacity: 0.3;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 3;
        }

        .pitch {
            fill: #c2a373;
            opacity: 0.6;
        }

        .shot-line {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transform-origin: 400px 400px;
        }

        .shot-1 {
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 3;
        }

        .shot-2 {
            stroke: var(--accent-cyan);
            stroke-width: 4;
        }

        .shot-4 {
            stroke: var(--accent-yellow);
            stroke-width: 6;
        }

        .shot-6 {
            stroke: var(--accent-pink);
            stroke-width: 8;
        }

        .zone-label {
            font-family: var(--font-body);
            font-size: 26px;
            font-weight: 700;
            fill: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Footer Legend */
        .chart-footer {
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.4);
            position: relative; z-index: 5;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: wagon_wheel.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas">
        <div id="wagon-container">

            <!-- Header -->
            <div class="chart-header">
                <div class="header-title">Wagon Wheel</div>
                <div class="header-title" style="font-size: 15px; opacity: 0.8;">T20 International</div>
            </div>

            <!-- Main Chart Area (Split Layout) -->
            <div class="chart-body">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png" class="sc-watermark" alt="Watermark">

                <!-- Left Column: Player Info -->
                <div class="left-col">
                    <img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png" class="player-portrait"
                        alt="Virat Kohli">
                    <div class="player-info">
                        <div class="player-name" id="p-name">Virat Kohli</div>
                        <div class="player-stat" id="p-stat">82 Runs (53 Balls)</div>
                    </div>
                </div>

                <!-- Right Column: Wagon Wheel -->
                <div class="field-area">
                    <svg class="wagon-svg" viewBox="0 0 800 800">
                        <!-- Outfield Background -->
                        <circle cx="400" cy="400" r="380" class="field-boundary" />
                        <!-- 30 yard inner circle -->
                        <circle cx="400" cy="400" r="180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"
                            stroke-dasharray="8 6" />
                        <!-- Pitch -->
                        <rect x="388" y="320" width="24" height="160" rx="4" class="pitch" />

                        <!-- Zone Labels -->
                        <text x="400" y="55" text-anchor="middle" class="zone-label">Straight</text>
                        <text x="400" y="765" text-anchor="middle" class="zone-label">Behind</text>
                        <text x="45" y="410" text-anchor="middle" class="zone-label" transform="rotate(-90 45,410)">Off
                            Side</text>
                        <text x="755" y="410" text-anchor="middle" class="zone-label" transform="rotate(90 755,410)">On
                            Side</text>

                        <!-- Shot Lines (GSAP Target) -->
                        <g id="shots-layer">
                            <!-- JS will inject arc lines here -->
                        </g>

                        <!-- Center Pitch Dot -->
                        <circle cx="400" cy="400" r="6" fill="#ffffff" />
                    </svg>
                </div>

            </div>

            <!-- Footer Legend -->
            <div class="chart-footer">
                <div class="legend-item">
                    <div class="legend-dot" style="background:rgba(255,255,255,0.7)"></div> Singles
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:var(--accent-cyan)"></div> Doubles
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:var(--accent-yellow)"></div> Fours
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:var(--accent-pink)"></div> Sixes
                </div>
            </div>

        </div>
    </div>

    <script>
        const graphicData = {
            player: "Virat Kohli",
            score: "82",
            balls: "53",
            shots: [
                { angle: 10, dist: 380, runs: 6 },
                { angle: 330, dist: 380, runs: 4 },
                { angle: 45, dist: 180, runs: 1 },
                { angle: 180, dist: 150, runs: 2 },
                { angle: 260, dist: 380, runs: 6 },
                { angle: 90, dist: 380, runs: 4 },
                { angle: 120, dist: 220, runs: 2 },
                { angle: 210, dist: 380, runs: 4 },
                { angle: 300, dist: 170, runs: 1 },
                { angle: 150, dist: 380, runs: 4 },
                { angle: 20, dist: 380, runs: 6 },
                { angle: 350, dist: 140, runs: 1 }
            ]
        };

        function generateShots() {
            const container = document.getElementById('shots-layer');
            const origin = { x: 400, y: 400 };

            graphicData.shots.forEach((shot) => {
                const rad = (shot.angle - 90) * (Math.PI / 180);
                const x2 = origin.x + Math.cos(rad) * shot.dist;
                const y2 = origin.y + Math.sin(rad) * shot.dist;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", origin.x);
                line.setAttribute("y1", origin.y);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.classList.add("shot-line", `shot-${shot.runs}`);

                container.appendChild(line);
            });
        }

        function show() {
            const tl = gsap.timeline();

            // Set Initial States for Advanced Animation
            // Avoid 3D tilt that can visually push the header outside the safe area.
            gsap.set("#wagon-container", { y: 0, opacity: 0, rotationX: 0, scale: 0.98 });
            gsap.set(".chart-header", { y: 0, opacity: 0 });
            gsap.set(".left-col", { x: -40, opacity: 0, scale: 0.95 });
            gsap.set(".field-boundary", { opacity: 0, scale: 0.8, transformOrigin: "center" });
            gsap.set(".pitch", { opacity: 0, scale: 0.5, transformOrigin: "center" });
            gsap.set(".zone-label", { opacity: 0, y: 0 });
            gsap.set(".shot-line", { strokeDashoffset: 1000 });
            gsap.set(".chart-footer", { y: 0, opacity: 0 });

            // 1. Container 3D Resolve
            tl.to("#wagon-container", {
                duration: 1,
                y: 0,
                opacity: 1,
                rotationX: 0,
                scale: 1,
                ease: "power3.out"
            })
            // 2. Snap down header
            .to(".chart-header", {
                duration: 0.6,
                y: 0,
                opacity: 1,
                ease: "back.out(1.5)"
            }, "-=0.6")
            // 3. Slide in Player Info block
            .to(".left-col", {
                duration: 0.8,
                x: 0,
                opacity: 1,
                scale: 1,
                ease: "expo.out"
            }, "-=0.4")
            // 4. Pop the field background ring
            .to(".field-boundary", {
                duration: 0.8,
                opacity: 0.3,
                scale: 1,
                ease: "back.out(1.2)"
            }, "-=0.6")
            // 5. Build the pitch block inside
            .to(".pitch", {
                duration: 0.6,
                opacity: 0.6,
                scale: 1,
                ease: "back.out(1.2)"
            }, "-=0.4")
            // 6. Pop up the direction labels
            .to(".zone-label", {
                duration: 0.4,
                opacity: 1,
                y: 0,
                stagger: 0.05,
                ease: "power2.out"
            }, "-=0.2")
            // 7. Dynamic spring trace of the shot lines
            .to(".shot-line", {
                duration: 1.5,
                strokeDashoffset: 0,
                stagger: 0.08,
                ease: "power3.inOut"
            }, "-=0.5")
            // 8. Lastly, reveal the footer legend
            .to(".chart-footer", {
                duration: 0.5,
                y: 0,
                opacity: 1,
                ease: "power2.out"
            }, "-=1.2");
        }
        function hide() {
            const tl = gsap.timeline();
            tl.to('.chart-footer', { opacity: 0, duration: 0.3 })
                .to('.shot-line', { strokeDashoffset: 1000, duration: 0.55, stagger: 0.06, ease: 'power2.in' }, '-=0.15')
                .to('.zone-label', { opacity: 0, duration: 0.28, stagger: 0.04 }, '-=0.2')
                .to('.pitch', { opacity: 0, scale: 0.5, duration: 0.4, ease: 'power2.in' }, '-=0.15')
                .to('.field-boundary', { opacity: 0, scale: 0.8, duration: 0.45, ease: 'power2.in' }, '-=0.2')
                .to('.left-col', { x: -40, opacity: 0, scale: 0.95, duration: 0.5, ease: 'power2.in' }, '-=0.15')
                .to('.chart-header', { opacity: 0, duration: 0.4 }, '-=0.2')
                .to('#wagon-container', { opacity: 0, scale: 0.98, duration: 0.6, ease: 'power2.in' }, '-=0.2');
        }


        window.onload = () => {
            generateShots();
            show();
        };
    
    

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
