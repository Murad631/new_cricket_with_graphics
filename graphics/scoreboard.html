<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Cricket Scoreboard - Crystal Broadcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary-navy: #4d03a7;
            --accent-pink: #ed008c;
            --accent-cyan: #00bef1;
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --glass-shine: rgba(255, 255, 255, 0.2);
            --glow-color: rgba(237, 0, 140, 0.4);
            --inner-border: rgba(255, 255, 255, 0.2);
        }

        .premium-glow {
            filter: drop-shadow(0 0 4px var(--glow-color));
        }

        .glass-panel {
            fill: url(#glass-gradient);
        }

        #total_runs,
        #outs {
            /* Text remains sharp without glow */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Align to bottom */
            align-items: center;
            padding-bottom: 0px;
            /* Absolute bottom */
            margin: 0;
        }

        #scoreboard-container {
            width: 100%;
            max-width: 1750px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            visibility: hidden;
            opacity: 0;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            max-width: 1800px;
        }

        /* Styles from original sytle.css */
        .bg-red-gradient {
            fill: url(#red-grad);
        }

        .bg-white {
            fill: #ffffff;
        }

        .bg-dark {
            fill: #220033;
        }

        #scoreboard text {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }

        #batting_team_name {
            fill: #ffffff;
            font-size: 55px;
            font-weight: 800;
        }

        #total_runs {
            fill: #ffffff;
            font-size: 70px;
            font-weight: 900;
        }

        #total_run_hyphen {
            fill: #ffffff;
            font-size: 50px;
            font-weight: 700;
        }

        #outs {
            fill: #ffcc00;
            font-size: 50px;
            font-weight: 900;
        }

        #total_overs {
            fill: #ffffff;
            font-size: 35px;
            font-weight: 700;
        }

        #total_over_heading {
            fill: #ffffff;
            font-size: 14px;
            font-weight: 700;
            opacity: 0.8;
        }

        #details {
            fill: #ffffff;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        #player1,
        #player2 {
            fill: #ffffff;
            font-size: 35px;
            font-weight: 800;
        }

        #player1_runs,
        #player2_runs {
            fill: #ffffff;
            font-size: 40px;
            font-weight: 900;
        }

        #player1_balls,
        #player2_balls {
            fill: #00bef1; /* Bright theme cyan for contrast */
            font-size: 24px;
            font-weight: 600;
        }

        #striker_arrow_path {
            fill: #fded00; /* Vibrant yellow arrow */
        }

        #bowler {
            fill: #ffffff;
            font-size: 35px;
            font-weight: 800;
        }

        #commentary {
            fill: #ffffff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #bowlling_team_name {
            fill: #ffffff;
            font-size: 55px;
            font-weight: 800;
        }

        #average {
            fill: #00bef1;
            font-size: 24px;
            font-weight: 600;
        }

        #averag_calculate {
            fill: #ffffff;
            font-size: 24px;
            font-weight: 900;
        }

        .disabled {
            fill: gray;
            opacity: 0.4;
            pointer-events: none;
        }

        #shine-sweep {
            position: absolute;
            top: 0;
            left: -50%;
            width: 40%;
            height: 100%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.8) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div id="scoreboard-container">
        <div id="shine-sweep"></div>
        <svg id="scoreboard" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2759 250">
            <defs>
                <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#d6003b" />
                    <stop offset="100%" stop-color="#7e005d" />
                </linearGradient>

                <linearGradient id="gloss-shine" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
                    <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
                </linearGradient>

                <linearGradient id="theme-border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00bef1" />
                    <stop offset="25%" stop-color="#ed008c" />
                    <stop offset="50%" stop-color="#4d03a7" />
                    <stop offset="75%" stop-color="#ed008c" />
                    <stop offset="100%" stop-color="#00bef1" />
                </linearGradient>

                <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#e8eef6" />
                </linearGradient>

                <!-- Refined Vibrant Contrast Gradient for Player/Bowler Panels -->
                <linearGradient id="panel-grad-left" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4d03a7" /> <!-- Primary theme navy -->
                    <stop offset="100%" stop-color="#1b004c" /> <!-- Deep elegant fade -->
                </linearGradient>

                <linearGradient id="panel-grad-right" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#1b004c" /> <!-- Deep elegant fade -->
                    <stop offset="100%" stop-color="#4d03a7" /> <!-- Primary theme navy -->
                </linearGradient>

                <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="1.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>

                <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
                    <rect width="100" height="2" fill="rgba(255,255,255,0.03)" />
                </pattern>

                <symbol id="corner-accent" viewBox="0 0 20 20">
                    <path d="M 0 20 L 0 0 L 20 0" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" />
                </symbol>

                <clipPath id="bat-flag-clip">
                    <path d="M 20 0 L 160 0 L 160 100 L 20 100 A 20 20 0 0 1 0 80 L 0 20 A 20 20 0 0 1 20 0 Z" />
                </clipPath>
                <clipPath id="bowl-flag-clip">
                    <path d="M 0 0 L 140 0 C 160 0 160 0 160 20 L 160 80 C 160 100 160 100 140 100 L 0 100 Z" />
                </clipPath>
            </defs>

            <g transform="translate(480, 50)">
                <!-- LEFT FLAG (BAT) -->
                <g id="batting_team_portion">
                    <path d="M 20 0 L 160 0 L 160 100 L 20 100 A 20 20 0 0 1 0 80 L 0 20 A 20 20 0 0 1 20 0 Z"
                        fill="url(#glass-gradient)" stroke="url(#theme-border-grad)" stroke-width="3" />
                    <!-- Inner pinstripe -->
                    <path d="M 22 2 L 158 2 L 158 98 L 22 98 A 18 18 0 0 1 2 80 L 2 20 A 18 18 0 0 1 22 2 Z" fill="none"
                        stroke="var(--inner-border)" stroke-width="1" />
                    <image x="0" y="0" width="160" height="100" id="batting_team_image" preserveAspectRatio="none"
                        clip-path="url(#bat-flag-clip)" />
                    <path d="M 20 0 L 160 0 L 160 100 L 20 100 A 20 20 0 0 1 0 80 L 0 20 A 20 20 0 0 1 20 0 Z"
                        fill="url(#gloss-shine)" clip-path="url(#bat-flag-clip)" />
                    <rect x="0" y="70" width="160" height="30" fill="rgba(0,0,0,0.85)"
                        clip-path="url(#bat-flag-clip)" />
                    <text id="batting_team_name" x="80" y="93" text-anchor="middle"
                        style="letter-spacing: 1px;">AUS</text>
                </g>

                <!-- PLAYERS PANEL -->
                <g id="players_portion" transform="translate(160, 0)">
                    <rect x="0" y="0" width="550" height="100" fill="url(#panel-grad-left)" stroke="url(#theme-border-grad)"
                        stroke-width="3" />
                    <rect x="2" y="2" width="546" height="96" fill="url(#gloss-shine)" stroke="var(--inner-border)"
                        stroke-width="1" />
                    <use href="#corner-accent" x="530" y="5" width="15" height="15"
                        transform="rotate(90, 537.5, 12.5)" />
                    <use href="#corner-accent" x="5" y="80" width="15" height="15"
                        transform="rotate(-90, 12.5, 87.5)" />
                    <g id="striker_arrow" transform="translate(10, 15)">
                        <path id="striker_arrow_path" d="M 0,0 L 10,10 L 0,20 Z" />
                    </g>
                    <g transform="translate(30, 40)">
                        <text id="player1" x="0" y="0">PLAYER 1</text>
                        <text id="player1_runs" x="350" y="0" text-anchor="end">0</text>
                        <text id="player1_balls" x="360" y="0" text-anchor="start">(0)</text>
                    </g>
                    <g transform="translate(30, 85)">
                        <text id="player2" x="0" y="0">PLAYER 2</text>
                        <text id="player2_runs" x="350" y="0" text-anchor="end">0</text>
                        <text id="player2_balls" x="360" y="0" text-anchor="start">(0)</text>
                    </g>
                </g>

                <!-- CENTER SCORE PANEL -->
                <g id="score_portion" transform="translate(710, -5)">
                    <rect x="0" y="0" width="500" height="110" class="bg-red-gradient" rx="4"
                        stroke="url(#theme-border-grad)" stroke-width="3" />
                    <rect x="2" y="2" width="496" height="106" fill="none" stroke="rgba(255,255,255,0.2)"
                        stroke-width="1" rx="2" />
                    <rect x="0" y="0" width="500" height="55" fill="url(#gloss-shine)" rx="4" />
                    <text id="details" x="485" y="25" text-anchor="end">MATCH INFO</text>
                    <g transform="translate(250, 85)">
                        <text id="total_runs" x="-70" y="0" text-anchor="end">0</text>
                        <text id="total_run_hyphen" x="-50" y="-5" text-anchor="middle">-</text>
                        <text id="outs" x="-30" y="0" text-anchor="start">0</text>
                        <text id="total_overs" x="90" y="0" text-anchor="start">0.0</text>
                        <text id="total_over_heading" x="160" y="0" text-anchor="start">OVERS</text>
                    </g>
                    <!-- Bottom Status Bar -->
                    <g id="commentary_portion" transform="translate(0, 110)">
                        <path d="M -250 0 L 750 0 L 730 45 L -230 45 Z" class="bg-dark" stroke="url(#theme-border-grad)"
                            stroke-width="3" />
                        <path d="M -248 1 L 748 1 L 729 44 L -229 44 Z" fill="none" stroke="rgba(255,255,255,0.1)"
                            stroke-width="1" />
                        <path d="M -250 0 L 750 0 L 730 45 L -230 45 Z" fill="url(#scanlines)" />
                        <text id="commentary" x="250" y="32" text-anchor="middle">Match is Starting</text>
                    </g>
                </g>

                <!-- BOWLER PANEL -->
                <g id="bowler_portion" transform="translate(1210, 0)">
                    <rect x="0" y="0" width="450" height="100" fill="url(#panel-grad-right)" stroke="url(#theme-border-grad)"
                        stroke-width="3" />
                    <rect x="2" y="2" width="446" height="96" fill="url(#gloss-shine)" stroke="var(--inner-border)"
                        stroke-width="1" />
                    <use href="#corner-accent" x="5" y="5" width="15" height="15" />
                    <use href="#corner-accent" x="430" y="80" width="15" height="15"
                        transform="rotate(180, 437.5, 87.5)" />
                    <text id="bowler" x="30" y="40">BOWLER NAME</text>
                    <g transform="translate(250, 32)">
                        <text id="average" x="120" y="0" text-anchor="end"></text>
                        <text id="averag_calculate" x="130" y="0" text-anchor="start"></text>
                    </g>
                    <g id="overSummary" transform="translate(30, 70) scale(0.8)"></g>
                </g>

                <!-- RIGHT FLAG (BOWL) -->
                <g id="bowling_team_portion" transform="translate(1660, 0)">
                    <path d="M 0 0 L 140 0 C 160 0 160 0 160 20 L 160 80 C 160 100 160 100 140 100 L 0 100 Z"
                        fill="url(#glass-gradient)" stroke="url(#theme-border-grad)" stroke-width="3" />
                    <!-- Inner pinstripe -->
                    <path d="M 2 2 L 138 2 C 158 2 158 2 158 20 L 158 80 C 158 98 158 98 138 98 L 2 98 Z" fill="none"
                        stroke="var(--inner-border)" stroke-width="1" />
                    <image x="0" y="0" width="160" height="100" id="bowling_team_image" preserveAspectRatio="none"
                        clip-path="url(#bowl-flag-clip)" />
                    <path d="M 0 0 L 140 0 C 160 0 160 0 160 20 L 160 80 C 160 100 160 100 140 100 L 0 100 Z"
                        fill="url(#gloss-shine)" clip-path="url(#bowl-flag-clip)" />
                    <rect x="0" y="70" width="160" height="30" fill="rgba(0,0,0,0.85)"
                        clip-path="url(#bowl-flag-clip)" />
                    <text id="bowlling_team_name" x="80" y="93" text-anchor="middle"
                        style="letter-spacing: 1px;">PAK</text>
                </g>
            </g>
        </svg>
    </div>

    <script>
        const socket = io('http://localhost:3000');
        const overGroup = document.getElementById('overSummary');
        const arrowEl = document.getElementById('striker_arrow');

        let currentStrikerRow = 1;
        let crrTimeline = null;
        let commentaryTimeline = null;

        function applyPlayersData(data) {
            updatePlayer("player1", data.striker.lastName, data.striker.runs, data.striker.balls);
            updatePlayer("player2", data.nonStriker.lastName, data.nonStriker.runs, data.nonStriker.balls);

            // Update arrow position from backend striker_side
            if (data.striker_side !== undefined) {
                currentStrikerRow = Number(data.striker_side);
            }
            updateArrow();

            document.getElementById('bowler').textContent = data.bowler.lastName;
            let overData = Array.isArray(data.bowler.over_state) ? data.bowler.over_state : [];

            if (data.inning) {
                document.getElementById("details").textContent = data.inning.batting_short_name + ' v ' + data.inning.bowling_short_name;
                document.getElementById("bowlling_team_name").textContent = data.inning.bowling_short_name;
                document.getElementById("batting_team_name").textContent = data.inning.batting_short_name;
                document.getElementById("bowling_team_image").setAttribute("href", data.inning.bowling_logo);
                document.getElementById("batting_team_image").setAttribute("href", data.inning.batting_logo);
            }

            drawOverSummary(overData);
            ActivePlayer();
        }

        function applyScoreboardData(data) {
            document.getElementById("total_runs").textContent = data.totalRun || '0';
            document.getElementById("outs").textContent = data.totalWicket || '0';
            document.getElementById("total_overs").textContent = data.overs || '0.0';

            if (data.player1_runs !== undefined) document.getElementById('player1_runs').textContent = data.player1_runs;
            if (data.player2_runs !== undefined) document.getElementById('player2_runs').textContent = data.player2_runs;
            if (data.player1_ball !== undefined) document.getElementById('player1_balls').textContent = `(${data.player1_ball})`;
            if (data.player2_ball !== undefined) document.getElementById('player2_balls').textContent = `(${data.player2_ball})`;

            // Update arrow from backend onStrike value
            if (data.onStrike !== undefined) {
                currentStrikerRow = Number(data.onStrike);
                updateArrow();
            }

            let overData = [];
            if (Array.isArray(data.ball_state)) {
                overData = data.ball_state;
                drawOverSummary(overData);
            }

            if (data.wicket && data.wicket.playerOutId) {
                DisabledPlayer(data.wicket.outPlayer);
            }
        }

        socket.on('setPlayers', (data) => {
            applyPlayersData(data);
        });

        socket.on('swictPlayerUpDown', (data) => {
            currentStrikerRow = (currentStrikerRow === 1) ? 2 : 1;
            updateArrow();
        });

        socket.on('scoreboard', (data) => {
            applyScoreboardData(data);
        });

        socket.on('show-crr', (data) => showStat('CRR', data.currentRunRate));
        socket.on('show-rrr', (data) => showStat('RRR', data.requiredRunRate));

        socket.on('dynamicText', (data) => updateCommentary(data, 7));
        socket.on('show_message', (data) => updateCommentary(data, 0)); // 0 means stay


        function updateArrow() {
            if (!arrowEl) return;
            const targetY = (currentStrikerRow === 1) ? 15 : 60;
            gsap.to(arrowEl, { y: targetY, duration: 0.3, ease: "power2.inOut" });
        }

        function updatePlayer(id, name, runs, balls) {
            document.getElementById(id).textContent = name;
            document.getElementById(id + "_runs").textContent = runs;
            document.getElementById(id + "_balls").textContent = `(${balls})`;
        }

        function drawOverSummary(overData) {
            const maxAreaWidth = 440;
            const boxSize = 40;
            const gap = 5;
            const totalWidth = overData.length * (boxSize + gap);

            overGroup.innerHTML = '';
            overGroup.setAttribute("transform", "translate(10, 58)");

            if (totalWidth > maxAreaWidth) {
                const scale = maxAreaWidth / totalWidth;
                overGroup.setAttribute("transform", `translate(10, 58) scale(${scale})`);
            }

            overData.forEach((ball, index) => {
                let color = '#3576ff';
                const ballStr = String(ball);
                if (ballStr === '4') color = '#0e9f11';
                else if (ballStr === '6') color = '#d92738';
                else if (ballStr === 'W') color = '#300000';
                else if (['NB', 'WD', 'NB+', 'WD+'].some(t => ballStr.includes(t))) color = '#ff9800';
                else if (['LB', 'B'].some(t => ballStr.includes(t))) color = '#000000';

                const x = index * (boxSize + gap);

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', 0);
                rect.setAttribute('width', boxSize);
                rect.setAttribute('height', boxSize);
                rect.setAttribute('rx', '4');
                rect.setAttribute('fill', color);
                rect.setAttribute('stroke', 'white');
                rect.setAttribute('stroke-opacity', '0.4');

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x + boxSize / 2);
                text.setAttribute('y', boxSize / 2 + 7);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#fff');
                text.setAttribute('font-size', '25');
                text.setAttribute('font-weight', 'bold');
                text.textContent = ball;

                overGroup.appendChild(rect);
                overGroup.appendChild(text);
            });
        }

        function showStat(labelText, value) {
            const labelEl = document.getElementById('average');
            const numberEl = document.getElementById('averag_calculate');
            if (crrTimeline) crrTimeline.kill();
            crrTimeline = gsap.timeline();
            labelEl.textContent = labelText;
            numberEl.textContent = value;
            crrTimeline.to([labelEl, numberEl], { opacity: 1, duration: 0.5 })
                .to({}, { duration: 5 })
                .to([labelEl, numberEl], { opacity: 0, duration: 0.5 });
        }

        function updateCommentary(text, duration) {
            const el = document.getElementById('commentary');
            if (commentaryTimeline) commentaryTimeline.kill();
            commentaryTimeline = gsap.timeline();
            commentaryTimeline.to(el, { opacity: 0, duration: 0.3 })
                .call(() => el.textContent = text.trim())
                .to(el, { opacity: 1, duration: 0.6 });
            if (duration > 0) {
                commentaryTimeline.to({}, { duration: duration }).to(el, { opacity: 0, duration: 0.5 });
            }
        }

        function DisabledPlayer(index) {
            const prefix = (index === 1) ? "player1" : "player2";
            document.getElementById(prefix).classList.add("disabled");
            document.getElementById(prefix + "_runs").classList.add("disabled");
            document.getElementById(prefix + "_balls").classList.add("disabled");
        }

        function ActivePlayer() {
            ["player1", "player2"].forEach(p => {
                document.getElementById(p).classList.remove("disabled");
                document.getElementById(p + "_runs").classList.remove("disabled");
                document.getElementById(p + "_balls").classList.remove("disabled");
            });
        }

        // =============================================
        // ANIMATION: Clean Professional Slide-Up
        // Simple. Fast. No distortion. Broadcast-grade.
        // =============================================
        let currentTimeline = null;
        let isVisible = false;
        let isAnimating = false;

        function show() {
            if (isAnimating || isVisible) return;
            isAnimating = true;
            if (currentTimeline) currentTimeline.kill();

            const container = document.getElementById('scoreboard-container');
            const shine = document.getElementById('shine-sweep');
            const sections = ['#score_portion', '#players_portion', '#bowler_portion', '#batting_team_portion', '#bowling_team_portion'];
            
            // Clear any lingering GSAP props before starting fresh
            gsap.set([...sections, 'text', '#overSummary rect', '#overSummary text'], { clearProps: "all" });
            gsap.killTweensOf([container, shine, ...sections, 'text', '#overSummary rect', '#overSummary text']);

            // Set initial invisible states for dramatic entrance
            gsap.set(container, { visibility: 'visible', opacity: 1 });
            gsap.set(shine, { x: "-100%", opacity: 0 });

            currentTimeline = gsap.timeline({
                onComplete: () => { isVisible = true; isAnimating = false; }
            });

            currentTimeline
                // 1. Center base rises with heavy impact
                .from('#score_portion', { y: "+=80", opacity: 0, duration: 0.6, ease: "back.out(1.4)" })
                
                // 2. Play panels slide outwards gracefully
                .from('#players_portion', { x: "+=60", opacity: 0, duration: 0.6, ease: "power3.out" }, "-=0.35")
                .from('#bowler_portion', { x: "-=60", opacity: 0, duration: 0.6, ease: "power3.out" }, "-=0.6")
                
                // 3. Flags snap/burst into position at the edges
                .from('#batting_team_portion', { scale: 0.5, opacity: 0, duration: 0.5, transformOrigin: "80% 50%", ease: "back.out(2)" }, "-=0.3")
                .from('#bowling_team_portion', { scale: 0.5, opacity: 0, duration: 0.5, transformOrigin: "20% 50%", ease: "back.out(2)" }, "-=0.5")
                
                // 4. Text/Numbers reveal sequentially with a fluid liquid-style pop
                .from('text', { opacity: 0, y: "+=15", duration: 0.4, stagger: 0.008, ease: "power2.out" }, "-=0.4")
                
                // 5. Over summary balls aggressively pop in
                .from('#overSummary rect, #overSummary text', { opacity: 0, scale: 0, transformOrigin: "50% 50%", duration: 0.35, stagger: 0.03, ease: "back.out(2.5)" }, "-=0.3")
                
                // 6. Premium broadcast shine sweeps across the entire UI
                .to(shine, { opacity: 0.8, x: "250%", duration: 1.1, ease: "power2.inOut" }, "-=0.6")
                .to(shine, { opacity: 0, duration: 0.2 }, "-=0.2");
        }

        function hide() {
            if (currentTimeline) currentTimeline.kill();
            isAnimating = true;

            const container = document.getElementById('scoreboard-container');
            const sections = ['#score_portion', '#players_portion', '#bowler_portion', '#batting_team_portion', '#bowling_team_portion'];

            currentTimeline = gsap.timeline({
                onComplete: () => { 
                    isVisible = false; 
                    isAnimating = false; 
                    gsap.set(container, { visibility: 'hidden' });
                    // Clear all GSAP inline styles so the graphic resets to its raw SVG state
                    gsap.set([...sections, 'text', '#overSummary rect', '#overSummary text'], { clearProps: "all" });
                }
            });

            currentTimeline
                // 1. Balls shrink out
                .to('#overSummary rect, #overSummary text', { opacity: 0, scale: 0, transformOrigin: "50% 50%", duration: 0.2, stagger: -0.02, ease: "power2.in" })
                // 2. Text pulls up and hides
                .to('text', { opacity: 0, y: "-=10", duration: 0.25, stagger: -0.005, ease: "power2.in" }, "-=0.15")
                // 3. Flags snap back down
                .to('#batting_team_portion', { scale: 0.5, opacity: 0, transformOrigin: "80% 50%", duration: 0.3, ease: "back.in(1.5)" }, "-=0.1")
                .to('#bowling_team_portion', { scale: 0.5, opacity: 0, transformOrigin: "20% 50%", duration: 0.3, ease: "back.in(1.5)" }, "-=0.3")
                // 4. Panels retract inwards
                .to('#players_portion', { x: "+=60", opacity: 0, duration: 0.35, ease: "power2.inOut" }, "-=0.15")
                .to('#bowler_portion', { x: "-=60", opacity: 0, duration: 0.35, ease: "power2.inOut" }, "-=0.35")
                // 5. Center block drops away
                .to('#score_portion', { y: "+=50", opacity: 0, duration: 0.4, ease: "power3.in" }, "-=0.2");
        }

        // Listen ONLY for postMessage from Canvas
        window.addEventListener('message', (e) => {
            const msg = e.data;
            console.log("Scoreboard Received Message:", msg);
            
            if (msg === 'HIDE' || msg.type === 'HIDE' || msg.type === 'hide') {
                hide();
            } else if (msg.type === 'SHOW' || msg.type === 'show' || msg.type === 'UPDATE' || msg.type === 'update') {
                if (msg.data) {
                    if (msg.data.playersData) applyPlayersData(msg.data.playersData);
                    if (msg.data.scoreboardData) applyScoreboardData(msg.data.scoreboardData);
                }
                
                if (msg.type === 'SHOW' || msg.type === 'show') {
                    show();
                }
            }
        });
    </script>
</body>

</html>
