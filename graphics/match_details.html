<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Match Information - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 54px;
            padding-bottom: 115px;
        }

        #md-master {
            width: 1000px;
            background: var(--primary-navy-deep);
border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
            opacity: 0;
            position: relative; transform: scale(0.9);
        }

        .md-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: relative; border-bottom: 5px solid var(--accent-cyan);
            z-index: 10;
        }

        .md-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: var(--glass-shine);
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 32px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
        }

        .header-tourney {
            font-size: 14px;
            font-weight: 900;
            color: var(--text-white);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .md-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px 40px;
            background: var(--master-grad); position: relative; }

        .md-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 25px;
            border-left: 5px solid var(--accent-cyan);
            opacity: 0;
            transform: translateX(-30px);
        }

        .info-label {
            font-size: 11px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-value {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value.highlight {
            color: var(--accent-yellow);
        }

        .md-footer {
            height: 60px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-toss {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(253, 237, 0, 0.3);
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: match_details.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>
<body>

    <div id="safe-area" aria-hidden="true"></div>

    <div class="broadcast-canvas">
        <div id="md-master">
            <div class="md-header">
                <div class="header-title">MATCH INFORMATION</div>
                <div class="header-tourney">ICC T20 WORLD CUP 2026</div>
            </div>

            <div class="md-body">
                <!-- Location & Context -->
                <div class="md-section">
                    <div class="info-row">
                        <span class="info-label">Venue</span>
                        <span class="info-value">Dubai Stadium</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">City</span>
                        <span class="info-value">Dubai, UAE</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Match No.</span>
                        <span class="info-value highlight">Match 01</span>
                    </div>
                </div>

                <!-- Match Officials -->
                <div class="md-section">
                    <div class="info-row">
                        <span class="info-label">Umpire 1</span>
                        <span class="info-value">R. Kettleborough</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Umpire 2</span>
                        <span class="info-value">Nitin Menon</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Referee</span>
                        <span class="info-value">Javagal Srinath</span>
                    </div>
                </div>
            </div>

            <div class="md-footer">
                <div class="footer-toss">TOSS: INDIA WON & ELECTED TO BAT FIRST</div>
            </div>
        </div>
    </div>

    <script>
        function renderDetails(data) {
            const master = document.getElementById('md-master');
            
            // Map incoming data to the UI
            // Assuming the structure from the API trigger
            if (data.title) document.querySelector('.header-title').innerText = data.title;
            if (data.tournament) document.querySelector('.header-tourney').innerText = data.tournament;
            
            // Map info rows
            const rows = document.querySelectorAll('.info-row');
            if (rows.length >= 6) {
                // Section 1: Venue, City, Match No
                rows[0].querySelector('.info-value').innerText = data.venue || 'TBD';
                rows[1].querySelector('.info-value').innerText = data.city || 'TBD';
                rows[2].querySelector('.info-value').innerText = data.matchNo || 'TBD';
                
                // Section 2: Umpires & Referee
                rows[3].querySelector('.info-value').innerText = data.umpire1 || 'TBD';
                rows[4].querySelector('.info-value').innerText = data.umpire2 || 'TBD';
                rows[5].querySelector('.info-value').innerText = data.referee || 'TBD';
            }
            
            if (data.toss) document.querySelector('.footer-toss').innerText = data.toss;

            // Trigger animation
            show();
        }

        function show() {
            const tl = gsap.timeline();
            gsap.set('#md-master', { visibility: 'visible' });

            tl.fromTo('#md-master', 
                { opacity: 0, scale: 0.95, y: 50 }, 
                { opacity: 1, scale: 1, y: 0, duration: 1, ease: 'power3.out' }
            )
            .fromTo('.info-row', 
                { opacity: 0, x: -50 }, 
                { opacity: 1, x: 0, duration: 0.8, stagger: 0.1, ease: 'power3.out' }, 
                '-=0.7'
            )
            .fromTo('.footer-toss', 
                { opacity: 0, y: 20 }, 
                { opacity: 1, y: 0, duration: 0.6, ease: 'back.out(1.5)' }, 
                '-=0.4'
            );
        }
        function hide() {
            const tl = gsap.timeline();
            tl.to('.footer-toss', { opacity: 0, y: 20, duration: 0.35, ease: 'power2.in' })
                .to('.info-row', { opacity: 0, x: -50, duration: 0.4, stagger: 0.06, ease: 'power2.in' }, '-=0.15')
                .to('#md-master', { opacity: 0, scale: 0.95, y: 50, duration: 0.55, ease: 'power2.in' }, '-=0.2');
        }

        // === LISTEN FOR COMMANDS ===
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (msg === 'HIDE' || msg.type === 'HIDE') {
                hide();
            } else if (msg.type === 'SHOW' || msg.type === 'UPDATE') {
                renderDetails(msg.data);
            } else if (msg.graphic === 'match_details') {
                renderDetails(msg.data);
            }
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        if (typeof io !== 'undefined') {
            const socket = io('http://localhost:3000');
            socket.on('graphic_event', (p) => {
                if (p.graphic === 'match_details') {
                    if (p.type === 'show' || p.type === 'update') {
                        renderDetails(p.data);
                    } else if (p.type === 'hide') {
                        hide();
                    }
                }
            });
        }
    </script>
</body>
</html>
