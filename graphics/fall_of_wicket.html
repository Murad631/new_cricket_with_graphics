<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=950, height=350">
    <title>Fall of Wicket - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 54px 0 115px; /* keep above bottom scoreboard/lower-third */
            box-sizing: border-box;
            margin: 0;
        }

        .broadcast-canvas-scaled {
            width: 950px;
            height: 350px;
            position: relative; display: flex;
            justify-content: center;
            align-items: center;
        }

        #fow-master {
            width: 900px;
            background: var(--primary-navy);
            background-image: var(--master-grad);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
            position: relative;
        }

        /* crystal: facet-shine overlay */
        #fow-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        .fow-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .fow-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .fow-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .fow-header-title {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .fow-body {
            height: 180px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
        }

        /* TIMELINE TRACK */
        .fow-timeline-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            position: relative; }

        .fow-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), #00ffff);
            border-radius: 4px;
            width: 0%;
            /* GSAP */
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .wkt-marker {
            position: absolute;
            top: -8px;
            width: 24px;
            height: 24px;
            background: var(--accent-pink);
            border: 3px solid var(--text-white);
            border-radius: 50%;
            z-index: 15;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(237, 0, 140, 0.9), inset 0 0 10px rgba(255, 255, 255, 0.6);
            transform: scale(0);
        }

        .wkt-marker::after {
            content: '';
            position: absolute;
            top: 22px;
            left: 50%;
            width: 2px;
            height: 45px;
            background: linear-gradient(180deg, var(--accent-pink), transparent);
            transform: translateX(-50%);
            opacity: 0.7;
            z-index: -1;
        }

        .wkt-info {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            opacity: 0;
            /* GSAP */
        }

        .wkt-score {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--text-white);
        }

        .wkt-player {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
        }

        .fow-footer {
            height: 40px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .fow-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .innings-meta {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .innings-meta span {
            color: var(--accent-yellow);
            margin: 0 10px;
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: fall_of_wicket.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas-scaled">
        <div id="fow-master">
            <div class="fow-header">
                <div class="fow-header-title">Fall of Wickets</div>
            </div>
            <div class="fow-body">
                <div class="fow-timeline-container" id="fow-timeline">
                    <div class="fow-progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="fow-footer">
                <div class="innings-meta" id="f-meta">Innings <span>•</span> Match Summary</div>
            </div>
        </div>
    </div>

    <script>
        window.updateGraphic = function(data) {
            if (!data) return;
            
            if (data.teamName) {
                document.getElementById('f-meta').innerHTML = `${data.teamName} Innings <span>•</span> ${data.matchInfo || 'Match Summary'}`;
            }

            if (data.wickets) {
                const container = document.getElementById('fow-timeline');
                const progressFill = document.getElementById('progress-fill');
                const totalOvers = data.totalOvers || 20;

                // Identify currently visible marker indices to avoid re-animating them if possible
                const existingIndices = Array.from(container.querySelectorAll('.wkt-marker')).map(m => m.getAttribute('data-idx'));

                data.wickets.forEach((w, index) => {
                    const idxStr = String(index);
                    if (existingIndices.includes(idxStr)) return; // Skip if already there

                    const parts = String(w.over || "0.0").split('.');
                    const oversDone = parseInt(parts[0]) || 0;
                    const ballsDone = parseInt(parts[1]) || 0;
                    const totalBallsDone = (oversDone * 6) + ballsDone;
                    const percentage = (totalBallsDone / (totalOvers * 6)) * 100;

                    const marker = document.createElement('div');
                    marker.className = 'wkt-marker';
                    marker.style.left = `${percentage}%`;
                    marker.setAttribute('data-idx', index);
                    container.appendChild(marker);

                    const info = document.createElement('div');
                    info.className = 'wkt-info';
                    info.style.left = `${percentage}%`;
                    info.setAttribute('data-idx', index);
                    info.innerHTML = `
                        <div class="wkt-score">${w.wicketNumber}/${w.score}</div>
                        <div class="wkt-player">${w.player_name}</div>
                    `;
                    container.appendChild(info);

                    // If graphic is already shown, animate this new marker in
                    const masterOpacity = window.getComputedStyle(document.getElementById('fow-master')).opacity;
                    if (masterOpacity !== '0') {
                        gsap.fromTo(marker, { scale: 0 }, { scale: 1, duration: 0.5, ease: 'back.out(1.7)' });
                        gsap.fromTo(info, { opacity: 0, y: 5 }, { opacity: 1, y: 0, duration: 0.4 });
                    }
                });
            }
        };

        function show() {
            const tl = gsap.timeline();
            const master = document.getElementById('fow-master');
            
            // Force reset progress bar for full entrance
            gsap.set('#progress-fill', { width: '0%' });
            gsap.set('.wkt-marker', { scale: 0 });
            gsap.set('.wkt-info', { opacity: 0 });

            tl.fromTo(master,
                { opacity: 0, y: 20 },
                { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }
            )
            .to('#progress-fill', {
                width: '100%',
                duration: 2.2,
                ease: 'power2.inOut'
            }, '-=0.3')
            .to('.wkt-marker', {
                scale: 1,
                duration: 0.5,
                stagger: 0.1,
                ease: 'back.out(1.7)'
            }, '-=1.8')
            .to('.wkt-info', {
                opacity: 1,
                duration: 0.4,
                stagger: 0.1,
                ease: 'power1.out'
            }, '-=1.5');
        }

        window.hide = function() {
            const tl = gsap.timeline({ defaults: { ease: 'power2.in' } });
            tl.to('.wkt-info', { opacity: 0, duration: 0.28, stagger: 0.1 })
                .to('.wkt-marker', { scale: 0, duration: 0.35, stagger: 0.1, ease: 'back.in(1.7)' }, '-=0.2')
                .to('#progress-fill', { width: '0%', duration: 0.55, ease: 'power3.in' }, '-=0.15')
                .to('#fow-master', { opacity: 0, duration: 0.65, ease: 'power3.in' }, '-=0.2');
        }

        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase2/fall-of-wickets/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    window.updateGraphic(json.data || json);
                }
            } catch (e) {}
        };

        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') window.hide();
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'fall_of_wicket' || p.graphic === 'fall-of-wicket') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) window.updateGraphic(p.data);
                    const master = document.getElementById('fow-master');
                    if (window.getComputedStyle(master).opacity === '0') {
                        show();
                    }
                } else if (p.type === 'hide') {
                    window.hide();
                }
            }
        });
    </script>
</body>

</html>
