<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>ICC T20 WC 2026 - Wicket Dismissal Standalone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 60px 100px 115px; /* keep above bottom scoreboard/lower-third */
        }

        .player-card {
            width: 920px;
            height: 140px;
            background: var(--primary-navy);
            background-image: var(--master-grad);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            position: relative; 
            overflow: hidden;
            visibility: hidden;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        .player-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        .player-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .player-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.15;
            background-image: var(--geo-texture);
            background-size: 250px 250px;
            background-position: 0 0;
            background-repeat: repeat;
            pointer-events: none;
        }

        .logo-section {
            width: 140px;
            background: rgba(255, 255, 255, 0.05); /* Unified dark glass look */
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 15px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 2px 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .divider-shattered {
            position: absolute;
            right: -42px;
            top: 0;
            bottom: 0;
            width: 43px;
            background: #ffd400;
            clip-path: polygon(0 0, 100% 0, 9% 33%, 100% 30%, 9% 72%, 92% 68%, 0% 103%);
            z-index: 11;
        }

        .flag-box {
            position: absolute;
            top: 15px;
            right: 40px;
            width: 82px;
            height: 54px;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #01411c;
            z-index: 6;
        }

        .flag-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Badge for "OUT" - Positioned below the flag */
        .out-badge {
            position: absolute;
            top: 75px; 
            right: 40px;
            width: 82px;
            background: var(--accent-pink);
            color: white;
            padding: 4px 0;
            text-align: center;
            font-weight: 950;
            font-size: 18px;
            border-radius: 3px;
            letter-spacing: 2px;
            z-index: 6;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid #fff;
        }

        .player-content {
            flex-grow: 1;
            padding: 20px 40px 20px 90px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* background: var(--master-grad); redundant now */
        }

        .player-name-line {
            display: flex;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .fn {
            color: var(--text-white);
            font-size: 42px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 15px;
        }

        .ln {
            color: var(--text-white);
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-display {
            display: flex;
            align-items: baseline;
            margin-left: 30px;
        }

        .runs {
            color: var(--accent-yellow);
            font-size: 44px;
            font-weight: 950;
            margin-right: 10px;
            text-shadow: 0 0 15px rgba(253, 237, 0, 0.3);
        }

        .balls {
            color: var(--text-white);
            font-size: 26px;
            font-weight: 700;
            opacity: 0.9;
        }

        .dismissal-line {
            color: var(--accent-cyan);
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            gap: 12px;
        }

        .small-txt {
            font-weight: 500;
            text-transform: lowercase;
            opacity: 0.85;
            color: #fff;
        }

        .stats-row {
            display: flex;
            gap: 50px;
        }

        .stat-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .stat-val {
            color: var(--text-white);
            font-size: 24px;
            font-weight: 900;
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: wicket_dismissal.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>
    <div id="safe-area" aria-hidden="true"></div>
    <div id="dismissal-card" class="player-card">
        <div class="logo-section">
            <img class="logo"
                src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png"
                alt="ICC T20 Logo">
            <div class="divider-shattered"></div>
        </div>

        <div class="flag-box">
            <img src="https://img.freepik.com/premium-vector/pakistan-national-flag-vector-illustration_1197690-140.jpg?semt=ais_incoming&w=740&q=80"
                alt="Pakistan Flag">
        </div>

        <div class="out-badge">OUT</div>

        <div class="player-content">
            <div class="player-name-line">
                <span class="fn">SALMAN</span>
                <span class="ln">ALI AGHA</span>
                <div class="score-display">
                    <span class="runs">4</span>
                    <span class="balls">(4)</span>
                </div>
            </div>

            <div class="dismissal-line">
                <span class="small-txt">c</span>
                <span>HARDIK</span>
                <span class="small-txt">b</span>
                <span>BUMRAH</span>
            </div>

            <div class="stats-row">
                <div class="stat-group">
                    <span class="stat-label">FOURS</span>
                    <span class="stat-val">1</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">SIXES</span>
                    <span class="stat-val">0</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">SR</span>
                    <span class="stat-val">100.0</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">DOTS</span>
                    <span class="stat-val">3</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 1. RENDER LOGIC ===
        function renderWicket(data) {
            console.log("Rendering Wicket Data:", data);
            
            // Player Name
            if (data.firstName) document.querySelector('.fn').textContent = data.firstName;
            if (data.lastName) document.querySelector('.ln').textContent = data.lastName;
            
            // Score
            if (data.runs !== undefined) document.querySelector('.runs').textContent = data.runs;
            if (data.balls !== undefined) document.querySelector('.balls').textContent = `(${data.balls})`;
            
            // Stats
            const statVals = document.querySelectorAll('.stat-val');
            if (data.fours !== undefined) statVals[0].textContent = data.fours;
            if (data.sixes !== undefined) statVals[1].textContent = data.sixes;
            if (data.strikeRate !== undefined) statVals[2].textContent = data.strikeRate;
            if (data.dotBalls !== undefined) statVals[3].textContent = data.dotBalls;

            // Dismissal Line
            const dismissalLine = document.querySelector('.dismissal-line');
            const type = data.wicketType;
            const bowler = data.bowlerName || "BOWLER";
            const fielder = data.fielderName || "";

            let html = '';
            if (type === 'BOWLED') {
                html = `<span class="small-txt">b</span> <span>${bowler}</span>`;
            } else if (type === 'CAUGHT') {
                html = `<span class="small-txt">c</span> <span>${fielder}</span> <span class="small-txt">b</span> <span>${bowler}</span>`;
            } else if (type === 'LBW') {
                html = `<span class="small-txt">lbw b</span> <span>${bowler}</span>`;
            } else if (type === 'RUN_OUT') {
                html = `<span class="small-txt">run out</span> <span>(${fielder})</span>`;
            } else if (type === 'STUMPED') {
                html = `<span class="small-txt">st</span> <span>${fielder}</span> <span class="small-txt">b</span> <span>${bowler}</span>`;
            } else if (type === 'HIT_WICKET') {
                html = `<span class="small-txt">hit wicket b</span> <span>${bowler}</span>`;
            } else {
                html = `<span>OUT</span>`;
            }
            dismissalLine.innerHTML = html;

            show();
        }

        // === 2. ANIMATION LOGIC ===
        let hideTimeout;

        function show() {
            clearTimeout(hideTimeout);

            const root = document.getElementById('dismissal-card');
            
            // Clean slate any existing animations so it can be re-triggered correctly
            gsap.killTweensOf([root, '.logo-section', '.player-content', '.flag-box', '.out-badge', '.stat-group']);
            gsap.set([root, '.logo-section', '.player-content', '.flag-box', '.out-badge', '.stat-group'], { clearProps: 'all' });

            gsap.set(root, { visibility: 'visible', opacity: 0, y: 50 });
            
            const tl = gsap.timeline();
            tl.to(root, { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' })
              .from('.logo-section', { x: -140, duration: 0.6, ease: 'power2.out' }, '-=0.4')
              .from('.player-content', { x: 50, opacity: 0, duration: 0.6 }, '-=0.4')
              .from('.flag-box, .out-badge', { scale: 0, opacity: 0, duration: 0.6, stagger: 0.1, ease: 'back.out' }, '-=0.2')
              .from('.stat-group', { y: 20, opacity: 0, duration: 0.4, stagger: 0.05 }, '-=0.4');

            // Auto-hide after 7 seconds
            hideTimeout = setTimeout(() => {
                hide();
            }, 7000);
        }

        function hide() {
            clearTimeout(hideTimeout);
            
            const tl = gsap.timeline({ defaults: { ease: 'power2.in' } });
            tl.to('.stat-group', { opacity: 0, y: 20, duration: 0.28, stagger: 0.04 })
                .to('.flag-box, .out-badge', { scale: 0, opacity: 0, duration: 0.35, stagger: 0.08, ease: 'back.in' }, '-=0.1')
                .to('.player-content', { x: 50, opacity: 0, duration: 0.45 }, '-=0.15')
                .to('.logo-section', { x: -140, opacity: 0, duration: 0.45 }, '-=0.25')
                .to('#dismissal-card', { opacity: 0, y: 50, duration: 0.5 }, '-=0.2')
                .set('#dismissal-card', { visibility: 'hidden' });
        }

        // === 3. LISTENERS (MASTER CANVAS & SOCKET) ===
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (msg === 'HIDE' || msg.type === 'HIDE') {
                hide();
            } else if (msg.type === 'SHOW' || msg.type === 'UPDATE') {
                renderWicket(msg.data);
            }
        });

        // Standalone Socket Listener (Matches leaderboard pattern)
        if (typeof io !== 'undefined') {
            const socket = io('http://localhost:3000');
            socket.on('graphic_event', (p) => {
                if (p.graphic === 'wicket_dismissal') {
                    if (p.type === 'show' || p.type === 'update') {
                        renderWicket(p.data);
                    } else if (p.type === 'hide') {
                        hide();
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
             gsap.set('#dismissal-card', { visibility: 'hidden', opacity: 0 });
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
</body>

</html>
