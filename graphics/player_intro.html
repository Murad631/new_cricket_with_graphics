        // Start hidden natively to prevent flash
        gsap.set('#player-l3', { opacity: 0 });

        setTimeout(() => { showGraphic(); }, 100);

        function showGraphic() {
            gsap.set('#player-l3', { display: 'flex' });
            gsap.fromTo('#player-l3', { x: -150, opacity: 0 }, { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' });

            gsap.to('#player-l3', { x: -150, opacity: 0, duration: 0.5, ease: 'power3.in' });
        }

        window.updateGraphicName = function(data) {
            try {
                const parsed = typeof data === "string" ? JSON.parse(data) : data;
                if (parsed.status === "hide" || parsed.hide) {
                    hideGraphic();
                } else {
                    showGraphic();
                }
            } catch (e) {
                // Ignore
            }
        };
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            hideGraphic();
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
