<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Points Table - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: rgba(0, 0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-body);
        }

        .broadcast-canvas {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            z-index: 100;
        }

        #points-master {
            width: fit-content;
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            margin: 0;
            max-height: calc(100vh - 54px - 115px);
            position: relative; 

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #points-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #points-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .pts-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .pts-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .pts-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .pts-header-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1;
            font-weight: 900;
        }

        .pts-grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--master-grad); position: relative; }

        .pts-table-head {
            display: grid;
            grid-template-columns: 60px 320px 60px 60px 60px 80px 80px 100px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: stretch;
            padding: 0 15px;
        }

        .pts-table-head > div {
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
        }

        .pts-table-head > div:last-child {
            border-right: none;
        }

        .pts-th {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            font-family: var(--font-body);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pts-team-flag {
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .pts-table-head > .th-left {
            justify-content: flex-start;
            padding-left: 20px;
        }

        .th-left {
            text-align: left;
        }

        #pts-rows-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 60px; /* high safety margin for last row visibility */
        }

        .pts-row {
            display: grid;
            grid-template-columns: 60px 320px 60px 60px 60px 80px 80px 100px;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); /* tight divider */
            align-items: stretch;
            opacity: 0;
            transition: background 0.2s ease;
            position: relative;
            z-index: 1;
        }

        /* tight crystal: per-row micro glass sheen */
        .pts-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.022) 0%,
                    transparent 50%,
                    rgba(0, 0, 0, 0.05) 100%);
        }

        .pts-row > div {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 10px;
        }

        .pts-row > div:nth-child(2) {
            justify-content: flex-start;
            padding-left: 20px;
        }

        .pts-row > div:last-child {
            border-right: none;
        }

        .pts-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .pts-row.highlight {
            background: rgba(237, 0, 140, 0.08);
            position: relative; }

        .pts-row.highlight::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-pink);
            z-index: 10;
        }

        .pts-rank {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
        }

        .pts-team {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            width: 100%;
        }

        .pts-stat {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-white);
            text-align: center;
            font-weight: 500;
        }

        .pts-stat.bold {
            font-weight: 700;
            color: var(--accent-cyan);
            font-size: 16px;
        }

        .pts-stat.nrr {
            font-size: 14px;
            color: var(--accent-yellow);
            font-weight: 700;
        }

        .pts-footer {
            height: 32px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            border-top: 1px solid rgba(0, 190, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            position: relative; 
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .pts-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .pts-meta {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: points_table.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>

    <div class="broadcast-canvas">
        <div id="points-master">
            <div class="pts-header">
                <div class="pts-header-title">Tournament Standings</div>
                <div class="pts-meta">ICC WORLD CUP &bull; GROUP A</div>
            </div>

            <div class="pts-grid-wrapper">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/2026_ICC_Men%27s_T20_World_Cup_logo.svg/1280px-2026_ICC_Men%27s_T20_World_Cup_logo.svg.png" class="sc-watermark" alt="Watermark">
                <div class="pts-table-head">
                    <div class="pts-th">Pos</div>
                    <div class="pts-th th-left">Team</div>
                    <div class="pts-th">P</div>
                    <div class="pts-th">W</div>
                    <div class="pts-th">L</div>
                    <div class="pts-th">PTS</div>
                    <div class="pts-th">NRR</div>
                    <div class="pts-th">Form</div>
                </div>
                <div id="pts-rows-container">
                    <!-- Rows injected by script -->
                </div>
            </div>

            <div class="pts-footer">
                <div class="pts-meta">Official Team Rankings &bull; Updated LIVE</div>
            </div>
        </div>
    </div>

    <script>
        const graphicData = {
            standings: [
                { rank: 1, team: "India", code: "IND", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313128.logo.png", p: 4, w: 4, l: 0, pts: 8, nrr: "+1.850", form: "WWWWW", highlight: true },
                { rank: 2, team: "Pakistan", code: "PAK", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313129.logo.png", p: 4, w: 3, l: 1, pts: 6, nrr: "+0.920", form: "WWWLW", highlight: false },
                { rank: 3, team: "Australia", code: "AUS", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313125.logo.png", p: 4, w: 3, l: 1, pts: 6, nrr: "+0.810", form: "WWLWW", highlight: false },
                { rank: 4, team: "England", code: "ENG", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313136.logo.png", p: 4, w: 2, l: 2, pts: 4, nrr: "+0.500", form: "WLLWW", highlight: false },
                { rank: 5, team: "South Africa", code: "RSA", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313151.logo.png", p: 4, w: 2, l: 2, pts: 4, nrr: "+0.200", form: "LLWWW", highlight: false },
                { rank: 6, team: "New Zealand", code: "NZ", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313144.logo.png", p: 4, w: 2, l: 2, pts: 4, nrr: "-0.100", form: "LWWLL", highlight: false },
                { rank: 7, team: "Sri Lanka", code: "SL", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313153.logo.png", p: 4, w: 1, l: 3, pts: 2, nrr: "-0.400", form: "LLLWN", highlight: false },
                { rank: 8, team: "West Indies", code: "WI", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313158.logo.png", p: 4, w: 1, l: 3, pts: 2, nrr: "-0.650", form: "LLWLL", highlight: false },
                { rank: 9, team: "Bangladesh", code: "BAN", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313126.logo.png", p: 4, w: 1, l: 3, pts: 2, nrr: "-0.890", form: "WLLLL", highlight: false },
                { rank: 10, team: "Afghanistan", code: "AFG", flag: "https://static.cricinfo.com/db/PICTURES/CMS/313100/313124.logo.png", p: 4, w: 1, l: 3, pts: 2, nrr: "-1.100", form: "LLLLW", highlight: false }
            ]
        };

        function renderTable() {
            const container = document.getElementById('pts-rows-container');
            container.innerHTML = '';
            graphicData.standings.forEach(s => {
                const row = document.createElement('div');
                row.className = `pts-row ${s.highlight ? 'highlight' : ''}`;
                row.innerHTML = `
                    <div class="pts-rank">${s.rank}</div>
                    <div class="pts-team">
                        <img src="${s.flag}" class="pts-team-flag" alt="${s.team}">
                        <span>${s.team}</span>
                    </div>
                    <div class="pts-stat">${s.p}</div>
                    <div class="pts-stat">${s.w}</div>
                    <div class="pts-stat">${s.l}</div>
                    <div class="pts-stat bold">${s.pts}</div>
                    <div class="pts-stat nrr">${s.nrr}</div>
                    <div class="pts-stat" style="font-size: 13px; opacity: 0.9; letter-spacing: 1px;">${s.form}</div>
                `;
                container.appendChild(row);
            });
        }

        function show() {
            const tl = gsap.timeline();
            tl.fromTo('#points-master',
                { opacity: 0, y: 0 },
                { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }
            )
                .fromTo('.pts-row',
                    { opacity: 0, x: -10 },
                    { opacity: 1, x: 0, duration: 0.4, stagger: 0.05, ease: 'power2.out' },
                    '-=0.4'
                );
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            show();
        });
    
    

        // === EXIT ANIMATION (Reverse of Show) ===

        function hide() {
            const tl = gsap.timeline();
            tl.to('.pts-row', { opacity: 0, x: 10, duration: 0.3, stagger: 0.04, ease: 'power2.in' })
              .to('#points-master', { opacity: 0, y: 20, duration: 0.7, ease: 'power3.in' }, '-=0.2');
        }

        // === LISTEN FOR CANVAS HIDE COMMAND ===
        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') hide();
        });
    </script>
</body>

</html>
