<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=950, height=350">
    <title>Partnership - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 54px 0 115px; /* keep above bottom scoreboard/lower-third */
            box-sizing: border-box;
            margin: 0;
        }

        .broadcast-canvas-scaled {
            width: 950px;
            height: 350px;
            position: relative; display: flex;
            justify-content: center;
            align-items: center;
        }

        #partnership-master {
            background: var(--primary-navy);
            background-image: var(--master-grad);
            position: relative;
            width: 900px;
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #partnership-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #partnership-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .partner-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative; 
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .partner-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .partner-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .partner-header-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
        }

        .partner-layout {
            flex: 1;
            display: flex;
            position: relative; background: rgba(0, 0, 0, 0.3);
        }

        /* PORTRAITS */
        .player-portrait-zone {
            width: 260px;
            position: relative; overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .player-portrait-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            opacity: 0;
            /* GSAP */
        }

        .player-vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--primary-navy-deep) 0%, transparent 60%);
        }

        /* CENTER CHASSIS */
        .partner-center-chassis {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 2px solid var(--accent-cyan);
            border-right: 2px solid var(--accent-cyan);
            background: var(--master-grad);
            position: relative; padding: 20px;
            z-index: 5;
        }

        .partner-main-runs {
            font-family: var(--font-display);
            font-size: 140px;
            color: var(--text-white);
            line-height: 1;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .partner-runs-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .partner-stats-grid {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            flex: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 5px;
            position: relative;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-item::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
        }

        .stat-val {
            font-family: var(--font-mono);
            font-size: 24px;
            color: var(--text-white);
            line-height: 1;
            font-weight: 700;
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* OVERLAYS FOR PLAYER NAMES */
        .player-info-overlay {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .p-name-ribbon {
            background: var(--accent-pink);
            padding: 5px 20px;
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .p-balls-inline {
            font-size: 13px;
            opacity: 0.8;
            margin-left: 4px;
        }

        .p-runs-small {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--accent-yellow);
            margin-top: 5px;
        }

        .p-balls-small {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-white);
            text-transform: uppercase;
            margin-top: -3px;
            opacity: 0.6;
        }

        .partner-footer {
            height: 28px;
            background: linear-gradient(90deg, rgba(77, 3, 167, 0.95) 0%, rgba(50, 0, 120, 0.95) 100%);
            border-top: 1px solid var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            position: relative;
            z-index: 1;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                inset 0 -1px 0 rgba(0, 0, 0, 0.28);
        }

        .partner-footer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.12) 30%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.12) 70%,
                transparent 100%);
        }

        .partner-meta {
            font-size: 15px;
            font-weight: 700;
            color: rgb(255 255 255);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── OPTIONAL SAFE-AREA OVERLAY (TV CHECK) ──
           Use: partnership.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="broadcast-canvas-scaled">
        <div id="partnership-master">
            <div class="partner-header">
                <div class="partner-header-title" id="partner-title">Third Wicket Partnership</div>
                <div class="partner-meta" id="partner-teams">INDIA vs PAKISTAN</div>
            </div>

            <div class="partner-layout">
                <!-- Left Player -->
                <div class="player-portrait-zone">
                    <img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png" class="p-img" id="p1-img">
                    <div class="player-vignette"></div>
                    <div class="player-info-overlay">
                        <div class="p-name-ribbon" id="p1-name">Rohit Sharma 45 <span class="p-balls-inline">(32)</span>
                        </div>

                    </div>
                </div>

                <!-- Center -->
                <div class="partner-center-chassis">
                    <div class="partner-main-runs" id="total-runs">92</div>
                    <div class="partner-runs-label">Partnership Runs</div>

                    <div class="partner-stats-grid">
                        <div class="stat-item">
                            <div class="stat-val" id="total-balls">64</div>
                            <div class="stat-lbl">Balls</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="rr">8.62</div>
                            <div class="stat-lbl">Run Rate</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="boundaries">10 / 4</div>
                            <div class="stat-lbl">4s / 6s</div>
                        </div>
                    </div>
                </div>

                <!-- Right Player -->
                <div class="player-portrait-zone">
                    <img src="https://static.cricinfo.com/db/PICTURES/CMS/316600/316605.png" class="p-img" id="p2-img">
                    <div class="player-vignette"></div>
                    <div class="player-info-overlay">
                        <div class="p-name-ribbon" id="p2-name">Virat Kohli 42 <span class="p-balls-inline">(30)</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="partner-footer">
                <div class="partner-meta">Asia Cup 2026 • Live Match Analysis</div>
            </div>
        </div>
    </div>

    <script>
        window.updateGraphic = function(data) {
            if (!data) return;

            if (data.batter1 && data.batter2) {
                document.getElementById('partner-title').textContent = "CURRENT PARTNERSHIP";
            }
            if (data.runs !== undefined) document.getElementById('total-runs').textContent = data.runs;
            if (data.balls !== undefined) document.getElementById('total-balls').textContent = data.balls;
            
            if (data.runs !== undefined && data.balls > 0) {
                const rr = (data.runs / (data.balls / 6)).toFixed(2);
                document.getElementById('rr').textContent = rr;
            }

            if (data.batter1) {
                document.getElementById('p1-name').innerHTML = `${data.batter1}`;
            }
            if (data.batter1Image) {
                document.getElementById('p1-img').src = data.batter1Image;
                gsap.set('#p1-img', { opacity: 1 });
            }
            
            if (data.batter2) {
                document.getElementById('p2-name').innerHTML = `${data.batter2}`;
            }
            if (data.batter2Image) {
                document.getElementById('p2-img').src = data.batter2Image;
                gsap.set('#p2-img', { opacity: 1 });
            }
        };

        function show() {
            const tl = gsap.timeline();

            tl.fromTo('#partnership-master',
                { opacity: 0, scale: 0.95, y: 0 },
                { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: 'expo.out' }
            )
                .fromTo('.p-img',
                    { opacity: 0, y: 0 },
                    { opacity: 1, y: 0, duration: 0.8, stagger: 0.3, ease: 'power3.out' },
                    '-=0.4'
                )
                .fromTo('.partner-center-chassis',
                    { scaleY: 0, transformOrigin: 'center' },
                    { scaleY: 1, duration: 0.8, ease: 'expo.out' },
                    '-=0.8'
                )
                .fromTo('.player-info-overlay',
                    { opacity: 0, y: 0 },
                    { opacity: 1, y: 0, duration: 0.4, stagger: 0.2 },
                    '-=0.4'
                );
        }

        window.hide = function() {
            const tl = gsap.timeline();
            tl.to('.partner-center-chassis', { scaleY: 0, duration: 0.5, ease: 'power3.in' })
              .to('.p-img', { opacity: 0, duration: 0.4, stagger: 0.1, ease: 'power2.in' }, '-=0.3')
              .to('#partnership-master', { opacity: 0, scale: 0.95, duration: 0.6, ease: 'power3.in' }, '-=0.2');
        }

        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase2/partnership/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    window.updateGraphic(json.data || json);
                }
            } catch (e) {}
        };

        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') window.hide();
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'partnership') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) window.updateGraphic(p.data);
                    const master = document.getElementById('partnership-master');
                    if (window.getComputedStyle(master).opacity === '0') {
                        show();
                    }
                } else if (p.type === 'hide') {
                    window.hide();
                }
            }
        });
    </script>
</body>

</html>
