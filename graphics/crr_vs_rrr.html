<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC T20 WC 2026 - CRR vs RRR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);
            --header-grad: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            --shadow-premium: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            /* Keep above bottom lower-third/scoreboard region */
            padding: 60px 100px 115px;
            /* Safe Area */
        }

        .rrr-graphic {
            width: 380px;
            background-color: var(--primary-navy);
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative; overflow: hidden;
            visibility: hidden;
            opacity: 0;
            border-left: 6px solid var(--accent-pink);
        }

        .rrr-graphic::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(168deg, rgba(77, 3, 167, 0.9) 0%, rgba(50, 0, 120, 0.98) 100%);
            z-index: 0;
        }

        .header {
            height: 55px;
            background: var(--header-grad);
            display: flex;
            align-items: center;
            padding: 0 25px;
            position: relative; z-index: 10;
        }

        .header-title {
            color: #fff;
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
        }

        .stats-container {
            padding: 25px;
            position: relative; z-index: 5;
            display: flex;
            justify-content: space-between;
            background: var(--master-grad); position: relative; border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .stat-box:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: var(--accent-cyan);
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .stat-value {
            color: #fff;
            font-family: var(--font-mono);
            font-size: 42px;
            font-weight: 700;
            line-height: 0.9;
        }

        .stat-value.rrr {
            color: var(--accent-yellow);
            text-shadow: 0 0 15px rgba(253, 237, 0, 0.3);
        }

        .need-text {
            height: 45px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            position: relative; z-index: 10;
            color: #fff;
            font-family: var(--font-display);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Glass Shine Overlay */
        .glass-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: var(--glass-shine);
            z-index: 15;
            pointer-events: none;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: crr_vs_rrr.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>
    <div class="rrr-graphic">
        <div class="glass-shine"></div>
        <div class="header">
            <div class="header-title">Run Rate</div>
        </div>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">CRR</span>
                <span class="stat-value" id="crr-val">0.00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">RRR</span>
                <span class="stat-value rrr" id="rrr-val">0.00</span>
            </div>
        </div>
        <div class="need-text" id="need-text">0 Runs needed from 0 Balls</div>
    </div>

    <script>
        window.updateGraphic = function(data) {
            if (!data) return;
            if (data.crr !== undefined) document.getElementById('crr-val').textContent = data.crr;
            if (data.rrr !== undefined) document.getElementById('rrr-val').textContent = data.rrr;
            if (data.runsNeeded !== undefined && data.remainingBalls !== undefined) {
                document.getElementById('need-text').textContent = `${data.runsNeeded} Runs needed from ${data.remainingBalls} Balls`;
            }
        };

        function show() {
            const graphic = document.querySelector('.rrr-graphic');
            const header = document.querySelector('.header');
            const stats = document.querySelectorAll('.stat-box');
            const footer = document.querySelector('.need-text');

            gsap.set(graphic, { visibility: 'visible', opacity: 0, scale: 0.95 });
            
            const tl = gsap.timeline({
                defaults: { ease: 'power4.out', duration: 1 }
            });

            tl.to(graphic, { opacity: 1, scale: 1 })
                .fromTo(header, { scaleX: 0, transformOrigin: 'left' }, { scaleX: 1, duration: 0.7 }, '-=0.6')
                .fromTo(stats, { opacity: 0, y: 15 }, { opacity: 1, y: 0, stagger: 0.2 }, '-=0.4')
                .fromTo(footer, { opacity: 0 }, { opacity: 1, duration: 0.5 }, '-=0.8');
        }

        window.hide = function() {
            const graphic = document.querySelector('.rrr-graphic');
            const tl = gsap.timeline({ defaults: { ease: 'power3.in', duration: 0.5 } });
            tl.to('.stat-box, .need-text', { opacity: 0, stagger: 0.05 })
                .to(graphic, { opacity: 0, scale: 0.95, duration: 0.6 }, '-=0.2')
                .set(graphic, { visibility: 'hidden' });
        }

        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase2/crr-vs-rrr/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    window.updateGraphic(json.data || json);
                }
            } catch (e) {}
        };

        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') window.hide();
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'crr_vs_rrr' || p.graphic === 'crr-vs-rrr') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) window.updateGraphic(p.data);
                    const master = document.querySelector('.rrr-graphic');
                    const style = window.getComputedStyle(master);
                    if (style.opacity === '0' || style.visibility === 'hidden') {
                        show();
                    }
                } else if (p.type === 'hide') {
                    window.hide();
                }
            }
        });
    </script>
</body>

</html>
