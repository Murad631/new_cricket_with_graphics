<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=950, height=350">
    <title>Extras - Crystal Glassy</title>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary-navy: #0e0423;
            --primary-navy-deep: #08021a;
            --accent-cyan: #00bef1;
            --accent-pink: #ed008c; /* CORRECT MAGENTA BRAND COLOR */
            --accent-yellow: #fded00;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --glass-shine: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --geo-texture: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 Q 100 50 200 100 T 400 100 M0 200 Q 100 150 200 200 T 400 200 M0 300 Q 100 250 200 300 T 400 300' fill='none' stroke='white' stroke-width='0.8' opacity='0.25'/%3E%3C/svg%3E");
            /* EXACT USER GRADIENT (SYNCED TO MAGENTA ACCENT) */
            --master-grad: linear-gradient(180deg, rgba(237, 0, 140, 0.45) 0%, rgba(77, 3, 167, 0.2) 100%);

            /* ── CRYSTAL ADDITIONS ── */
            --crystal-border-strong: rgba(255, 255, 255, 0.42);
            --crystal-shine-top: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 54px 120px 115px; /* safe area */
            box-sizing: border-box;
            margin: 0;
        }

        .broadcast-canvas-scaled {
            width: 100%;
            height: 100%;
            position: relative; display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }

        #extras-master {
            width: 260px;
            background: var(--primary-navy-deep);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-pink);
            border-top: 1px solid var(--crystal-border-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            position: relative;

            /* crystal: richer shadow stack */
            box-shadow:
                0 0 0 1px rgba(237, 0, 140, 0.15),
                0 15px 35px rgba(0, 0, 0, 0.4),
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--crystal-shine-top),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                inset 6px 0 50px rgba(237, 0, 140, 0.05),
                inset -6px 0 50px rgba(0, 190, 241, 0.05);

            /* crystal: frosted glass blur */
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
        }

        /* crystal: facet-shine overlay */
        #extras-master::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(237, 0, 140, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 190, 241, 0.06) 0%, transparent 50%),
                linear-gradient(125deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(255, 255, 255, 0.06) 48%,
                    rgba(255, 255, 255, 0.02) 55%,
                    transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* crystal: animated shimmer sweep */
        #extras-master::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 255, 255, 0.00) 30%,
                rgba(255, 255, 255, 0.05) 48%,
                rgba(255, 255, 255, 0.11) 50%,
                rgba(255, 255, 255, 0.05) 52%,
                rgba(255, 255, 255, 0.00) 70%,
                transparent 100%);
            animation: crystalSweep 5s ease-in-out infinite;
        }

        @keyframes crystalSweep {
            0%   { left: -120%; opacity: 0; }
            8%   { opacity: 1; }
            50%  { left: 140%; opacity: 1; }
            58%  { opacity: 0; }
            100% { left: 140%; opacity: 0; }
        }

        .extras-header {
            background: linear-gradient(90deg, var(--accent-pink) 0%, #ff30a1 100%);
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
            border-bottom: 2px solid var(--accent-cyan);
            z-index: 10;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.32),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .extras-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.65) 20%,
                rgba(255, 255, 255, 0.88) 50%,
                rgba(255, 255, 255, 0.65) 80%,
                transparent 100%);
            z-index: 5;
        }

        .extras-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
        }

        .extras-header-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .extras-body {
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            background: var(--master-grad); position: relative; }

        .extra-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            margin: 0 0 2px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateX(-15px);
            position: relative;
        }

        .extra-row::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
        }

        .extra-row.total {
            background: linear-gradient(90deg, rgba(237, 0, 140, 0.15) 0%, rgba(237, 0, 140, 0.06) 100%);
            border: 1px solid rgba(237, 0, 140, 0.4);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(237, 0, 140, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .extra-lbl {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .extra-row.total .extra-lbl {
            color: var(--text-white);
            font-weight: 700;
        }

        .extra-val {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--text-white);
            font-weight: 700;
        }

        .extra-row.total .extra-val {
            color: var(--accent-yellow);
            font-size: 24px;
        }

        /* â”€â”€ OPTIONAL SAFE-AREA OVERLAY (TV CHECK) â”€â”€
           Use: extras.html#safe-area
        */
        #safe-area {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 18px;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 99999;
        }

        #safe-area:target {
            display: block;
        }

        #safe-area::before {
            content: '';
            position: absolute;
            left: 96px;
            right: 96px;
            top: 54px;
            bottom: 54px;
            border: 1px dashed rgba(0, 190, 241, 0.85);
        }
    
        .sc-watermark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
    </style>
    <style>
        body * { box-shadow: none !important; }
    </style>
</head>

<body>

    <div id="safe-area" aria-hidden="true"></div>

    <div class="broadcast-canvas-scaled">
        <div id="extras-master">
            <div class="extras-header">
                <div class="extras-header-title">Match Extras</div>
            </div>
            <div class="extras-body">
                <div class="extra-row">
                    <span class="extra-lbl">Wides</span>
                    <span class="extra-val" id="extra-wide">0</span>
                </div>
                <div class="extra-row">
                    <span class="extra-lbl">No Balls</span>
                    <span class="extra-val" id="extra-noball">0</span>
                </div>
                <div class="extra-row">
                    <span class="extra-lbl">Leg Byes</span>
                    <span class="extra-val" id="extra-legbye">0</span>
                </div>
                <div class="extra-row">
                    <span class="extra-lbl">Byes</span>
                    <span class="extra-val" id="extra-bye">0</span>
                </div>
                <div class="extra-row total">
                    <span class="extra-lbl">Total Extras</span>
                    <span class="extra-val" id="extra-total">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.updateGraphic = function(data) {
            if (!data) return;
            if (data.wide !== undefined) document.getElementById('extra-wide').textContent = data.wide;
            if (data.noball !== undefined) document.getElementById('extra-noball').textContent = data.noball;
            if (data.legbye !== undefined) document.getElementById('extra-legbye').textContent = data.legbye;
            if (data.bye !== undefined) document.getElementById('extra-bye').textContent = data.bye;
            if (data.total !== undefined) document.getElementById('extra-total').textContent = data.total;
        };

        function show() {
            const tl = gsap.timeline();
            const master = document.getElementById('extras-master');

            tl.fromTo(master,
                { opacity: 0, scale: 0.95 },
                { opacity: 1, scale: 1, duration: 0.8, ease: 'expo.out' }
            )
            .fromTo('.extra-row',
                { opacity: 0, x: -20 },
                { opacity: 1, x: 0, duration: 0.5, stagger: 0.1, ease: 'power2.out' },
                '-=0.4'
            );
        }

        window.hide = function() {
            const tl = gsap.timeline();
            tl.to('.extra-row', { opacity: 0, x: 20, duration: 0.3, stagger: 0.04, ease: 'power2.in' })
              .to('#extras-master', { opacity: 0, scale: 0.95, duration: 0.6, ease: 'power3.in' }, '-=0.2');
        }

        window.onload = async () => {
            const matchId = new URLSearchParams(window.location.search).get('matchId') || 4;
            try {
                const res = await fetch(`http://localhost:3000/api/graphics/phase2/extras/${matchId}`);
                if (res.ok) {
                    const json = await res.json();
                    window.updateGraphic(json.data || json);
                }
            } catch (e) {}
        };

        window.addEventListener('message', (e) => {
            if (e.data === 'HIDE') window.hide();
        });
    </script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        socket.on('graphic_event', (p) => {
            if (p.graphic === 'extras') {
                if (p.type === 'show' || p.type === 'update') {
                    if (p.data) window.updateGraphic(p.data);
                    const master = document.getElementById('extras-master');
                    if (window.getComputedStyle(master).opacity === '0') {
                        show();
                    }
                } else if (p.type === 'hide') {
                    window.hide();
                }
            }
        });
    </script>
</body>
</html>
